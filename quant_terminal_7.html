// ============================================================

// ============================================================
const MONTHS = ['May \'25','Jun \'25','Jul \'25','Aug \'25','Sep \'25','Oct \'25','Nov \'25','Dec \'25','Jan \'26','Feb \'26','Mar \'26','Apr \'26','May \'26'];

// Shape template: where 1.0 = baseline of evenly distributed return.
// Represents broad market path with relative drawdowns/rallies.
const SHAPE_TEMPLATE = [0.00, 0.18, 0.40, 0.27, -0.04, 0.21, 0.52, 0.81, 0.93, 0.76, 1.07, 1.34, 1.52, 1.55];

// Per-ticker beta-amplified deviation from market shape — memoized (deterministic per ticker)
const _wealthSeriesCache = new Map();
function buildWealthSeries(ticker) {
  if (_wealthSeriesCache.has(ticker)) return _wealthSeriesCache.get(ticker);
  const out = _buildWealthSeriesImpl(ticker);
  _wealthSeriesCache.set(ticker, out);
  return out;
}
function _buildWealthSeriesImpl(ticker) {
  const data = TICKER_DB[ticker];
  if (!data) return MONTHS.map(() => 100);
  const targetReturn = data.ttm; // pct
  // Beta amplification: high-beta tickers swing harder
  const betaMult = Math.max(0.3, data.beta);
  // Scale shape so the final value = 100 * (1 + targetReturn/100)
  // Apply beta-driven amplification to drawdowns/rallies
  const baseline = SHAPE_TEMPLATE.map((s, i) => {
    if (i === 0) return 0;
    if (i === SHAPE_TEMPLATE.length - 1) return targetReturn; // anchor final
    // Amplify mid-path swings by beta, scale to target return
    const proportion = s / SHAPE_TEMPLATE[SHAPE_TEMPLATE.length - 1];
    const linearReturn = targetReturn * proportion;
    // Add beta-driven volatility flex around the path
    const deviation = (s - proportion * SHAPE_TEMPLATE[SHAPE_TEMPLATE.length - 1]) * betaMult;
    return linearReturn + deviation;
  });
  return baseline.map(r => +(100 * (1 + r / 100)).toFixed(2));
}

  let peak = series[0];
  return series.map(v => { if (v > peak) peak = v; return +((v / peak - 1) * 100).toFixed(2); });
}
function maxDD(series) { return Math.min(...calcDrawdown(series)); }

// Deterministic random for Monte Carlo
const seededRand = (seed) => { const s = Math.sin(seed) * 10000; return s - Math.floor(s); };
const boxMuller = (seed) => {
  const u1 = Math.max(0.0001, seededRand(seed));
  const u2 = seededRand(seed + 0.5);
  return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
};

// ============================================================
// QUANT MATH — returns, covariance, Cholesky, risk metrics
// ============================================================
// Monthly log returns from a price series
function logReturns(series) {
  const out = [];
  for (let i = 1; i < series.length; i++) {
    if (series[i - 1] > 0 && series[i] > 0) out.push(Math.log(series[i] / series[i - 1]));
  }
  return out;
}
const mean = (xs) => xs.length ? xs.reduce((s, x) => s + x, 0) / xs.length : 0;
const stdev = (xs) => {
  if (xs.length < 2) return 0;
  const m = mean(xs);
  return Math.sqrt(xs.reduce((s, x) => s + (x - m) ** 2, 0) / (xs.length - 1));
};
// Sample covariance between two equal-length return arrays
function covariance(a, b) {
  if (a.length !== b.length || a.length < 2) return 0;
  const ma = mean(a), mb = mean(b);
  let s = 0;
  for (let i = 0; i < a.length; i++) s += (a[i] - ma) * (b[i] - mb);
  return s / (a.length - 1);
}
// Build n×n covariance matrix from list of equal-length return arrays
function covMatrix(returnsList) {
  const n = returnsList.length;
  const C = Array.from({ length: n }, () => new Array(n).fill(0));
  for (let i = 0; i < n; i++) {
    for (let j = i; j < n; j++) {
      const c = covariance(returnsList[i], returnsList[j]);
      C[i][j] = c; C[j][i] = c;
    }
  }
  return C;
}
// Correlation from covariance
function corrFromCov(C) {
  const n = C.length;
  const R = Array.from({ length: n }, () => new Array(n).fill(0));
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const denom = Math.sqrt(Math.max(1e-12, C[i][i] * C[j][j]));
      R[i][j] = C[i][j] / denom;
    }
  }
  return R;
}
// Cholesky decomposition (lower triangular). Adds tiny ridge for PSD safety.
function cholesky(C) {
  const n = C.length;
  const L = Array.from({ length: n }, () => new Array(n).fill(0));
  const ridge = 1e-10;
  for (let i = 0; i < n; i++) {
    for (let j = 0; j <= i; j++) {
      let sum = 0;
      for (let k = 0; k < j; k++) sum += L[i][k] * L[j][k];
      if (i === j) {
        const d = C[i][i] - sum + ridge;
        L[i][j] = Math.sqrt(Math.max(d, ridge));
      } else {
        L[i][j] = (C[i][j] - sum) / (L[j][j] || ridge);
      }
    }
  }
  return L;
}
// Multiply lower-triangular L by vector z → correlated draws
function multLowerTri(L, z) {
  const n = L.length;
  const out = new Array(n).fill(0);
  for (let i = 0; i < n; i++) {
    let s = 0;
    for (let j = 0; j <= i; j++) s += L[i][j] * z[j];
    out[i] = s;
  }
  return out;
}
// Portfolio variance: wᵀΣw
function portfolioVariance(weights, C) {
  let v = 0;
  for (let i = 0; i < weights.length; i++) {
    for (let j = 0; j < weights.length; j++) v += weights[i] * weights[j] * C[i][j];
  }
  return Math.max(0, v);
}
// Empirical VaR / CVaR at confidence (e.g. 0.95) from a returns array
function empiricalVaR(returns, conf = 0.95) {
  if (!returns.length) return 0;
  const sorted = [...returns].sort((a, b) => a - b);
  const idx = Math.max(0, Math.floor((1 - conf) * sorted.length));
  return -sorted[idx]; // positive number = loss
}
// Gauss-Jordan general n×n matrix inverse. Returns null if singular.
function matrixInverse(M) {
  const n = M.length;
  if (!n || M[0].length !== n) return null;
  // Augment [M | I]
  const A = M.map((row, i) => {
    const aug = row.slice();
    for (let j = 0; j < n; j++) aug.push(i === j ? 1 : 0);
    return aug;
  });
  for (let i = 0; i < n; i++) {
    let pivRow = i;
    for (let r = i + 1; r < n; r++) if (Math.abs(A[r][i]) > Math.abs(A[pivRow][i])) pivRow = r;
    [A[i], A[pivRow]] = [A[pivRow], A[i]];
    const piv = A[i][i];
    if (Math.abs(piv) < 1e-12) return null;
    for (let j = 0; j < 2 * n; j++) A[i][j] /= piv;
    for (let r = 0; r < n; r++) {
      if (r === i) continue;
      const f = A[r][i];
      for (let j = 0; j < 2 * n; j++) A[r][j] -= f * A[i][j];
    }
  }
  return A.map(row => row.slice(n));
}

// Closed-form tangency (Sharpe-max) portfolio: w* = Σ⁻¹(μ − Rf·1) / 1ᵀΣ⁻¹(μ − Rf·1)
// Allows short weights. Use longOnlyTangency() for the long-only-projected version.
function tangencyPortfolio(C, mu, rf) {
  const n = C.length;
  const Ci = matrixInverse(C);
  if (!Ci) return null;
  const excess = mu.map(m => m - rf);
  const Cie = new Array(n).fill(0);
  for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) Cie[i] += Ci[i][j] * excess[j];
  const denom = Cie.reduce((s, x) => s + x, 0);
  if (Math.abs(denom) < 1e-12) return null;
  return Cie.map(x => x / denom);
}

// Long-only projected tangency: iteratively zero out shorted names and re-solve
// the tangency on the remaining active set. Terminates within n iterations.
function longOnlyTangency(C, mu, rf) {
  const n = C.length;
  let active = Array.from({ length: n }, (_, i) => i);
  for (let iter = 0; iter < n; iter++) {
    const subC = active.map(i => active.map(j => C[i][j]));
    const subMu = active.map(i => mu[i]);
    const subW = tangencyPortfolio(subC, subMu, rf);
    if (!subW) return null;
    // Find the worst short and drop it
    const negs = subW.map((w, idx) => ({ idx, w })).filter(x => x.w < -1e-9);
    if (negs.length === 0) {
      // Re-pack into n-vector
      const full = new Array(n).fill(0);
      active.forEach((origIdx, k) => full[origIdx] = subW[k]);
      // Final clamp + renormalize
      const clamped = full.map(x => Math.max(0, x));
      const sum = clamped.reduce((s, x) => s + x, 0);
      return sum > 0 ? clamped.map(x => x / sum) : clamped;
    }
    // Drop the deepest short and retry
    negs.sort((a, b) => a.w - b.w);
    const drop = active[negs[0].idx];
    active = active.filter(i => i !== drop);
    if (active.length === 0) return new Array(n).fill(1 / n);
  }
  return new Array(n).fill(1 / n);
}

// Ordinary least squares: β = (XᵀX)⁻¹Xᵀy, plus R². Gauss-Jordan inverse
// of XᵀX is fine for the small (k=4) systems we use for Fama-French.
function olsRegression(X, y) {
  const n = X.length;
  if (!n) return null;
  const k = X[0].length;
  const XtX = Array.from({ length: k }, () => new Array(k).fill(0));
  const Xty = new Array(k).fill(0);
  for (let m = 0; m < n; m++) {
    for (let i = 0; i < k; i++) {
      Xty[i] += X[m][i] * y[m];
      for (let j = 0; j < k; j++) XtX[i][j] += X[m][i] * X[m][j];
    }
  }
  // Solve via Gauss-Jordan on the augmented matrix
  const A = XtX.map((row, i) => [...row, Xty[i]]);
  for (let i = 0; i < k; i++) {
    let pivRow = i;
    for (let r = i + 1; r < k; r++) if (Math.abs(A[r][i]) > Math.abs(A[pivRow][i])) pivRow = r;
    [A[i], A[pivRow]] = [A[pivRow], A[i]];
    const piv = A[i][i];
    if (Math.abs(piv) < 1e-12) return null; // singular — collinear factors
    for (let j = 0; j <= k; j++) A[i][j] /= piv;
    for (let r = 0; r < k; r++) {
      if (r === i) continue;
      const f = A[r][i];
      for (let j = 0; j <= k; j++) A[r][j] -= f * A[i][j];
    }
  }
  const beta = A.map(row => row[k]);
  // R²
  const yMean = y.reduce((s, v) => s + v, 0) / n;
  let ssRes = 0, ssTot = 0;
  for (let m = 0; m < n; m++) {
    let yhat = 0;
    for (let i = 0; i < k; i++) yhat += X[m][i] * beta[i];
    ssRes += (y[m] - yhat) ** 2;
    ssTot += (y[m] - yMean) ** 2;
  }
  const r2 = ssTot > 1e-12 ? 1 - ssRes / ssTot : 0;
  return { beta, r2, n };
}

function empiricalCVaR(returns, conf = 0.95) {
  if (!returns.length) return 0;
  const sorted = [...returns].sort((a, b) => a - b);
  const cutoff = Math.max(1, Math.floor((1 - conf) * sorted.length));
  const tail = sorted.slice(0, cutoff);
  return -mean(tail);
}

// Tiingo — adjusted closes (split + dividend-adjusted, ideal for CAGR), CORS-enabled, 1000 req/day free.
async function fetchHistoryTiingo(ticker, token) {
  if (!token) throw new Error('No Tiingo token');
  const now = new Date();
  const start = new Date(now); start.setFullYear(now.getFullYear() - 20);
  const iso = d => d.toISOString().slice(0, 10);
  const url = `https://api.tiingo.com/tiingo/daily/${ticker.toLowerCase()}/prices?startDate=${iso(start)}&endDate=${iso(now)}&token=${token}`;
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if (!res.ok) {
    if (res.status === 404) throw new Error('Tiingo: ticker not found');
    if (res.status === 401) throw new Error('Tiingo: bad token');
    if (res.status === 429) throw new Error('Tiingo: rate-limited');
    throw new Error(`Tiingo HTTP ${res.status}`);
  }
  const data = await res.json();
  if (!Array.isArray(data) || data.length < 12) throw new Error('Tiingo: too few rows');
  // Use adjClose (total-return adjusted). date is ISO yyyy-mm-ddT...
  const all = data
    .map(r => ({ date: (r.date || '').slice(0, 10), close: r.adjClose ?? r.close }))
    .filter(r => r.date && Number.isFinite(r.close) && r.close > 0);
  if (all.length < 12) throw new Error('Tiingo: too few valid rows');
  // Downsample to month-end (keep last row of each YYYY-MM)
  const byMonth = new Map();
  for (const r of all) byMonth.set(r.date.slice(0, 7), r);
  return [...byMonth.values()];
}

// Provider chain: Tiingo (if key) → Stooq fallback. First success wins.
async function fetchHistoryAny(ticker, opts = {}) {
  const errors = [];
  if (opts.tiingoKey) {
    try { return await fetchHistoryTiingo(ticker, opts.tiingoKey); }
    catch (e) { errors.push(`tiingo: ${e.message}`); }
  }
  try { return await fetchHistoryStooq(ticker); }
  catch (e) { errors.push(`stooq: ${e.message}`); }
  throw new Error(errors.join(' · '));
}

async function fetchHistoryStooq(ticker) {
  const now = new Date();
  const start = new Date(now); start.setFullYear(now.getFullYear() - 20);
  const fmt = d => `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
  // Try daily first (most reliable Stooq endpoint), then downsample to monthly.
  // Falls back to weekly if daily fails.
  const tryFetch = async (interval) => {
    const url = `https://stooq.com/q/d/l/?s=${ticker.toLowerCase()}.us&i=${interval}&d1=${fmt(start)}&d2=${fmt(now)}`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`Stooq HTTP ${res.status}`);
    const text = (await res.text()).trim();
    if (!text) throw new Error('Empty response');
    if (text.toLowerCase().startsWith('no data') || text.toLowerCase().startsWith('<')) throw new Error('Stooq rejected');
    return text;
  };
  let text;
  try { text = await tryFetch('d'); }
  catch (e) { text = await tryFetch('w'); }
  const lines = text.split('\n');
  if (lines.length < 3) throw new Error('Insufficient rows');
  // Parse all rows
  const all = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(',');
    const date = cells[0];
    const close = parseFloat(cells[4]);
    if (!date || !Number.isFinite(close) || close <= 0) continue;
    all.push({ date, close });
  }
  if (all.length < 12) throw new Error('Too few rows');
  // Downsample to month-end (keep last row of each YYYY-MM)
  const byMonth = new Map();
  for (const r of all) {
    const key = r.date.slice(0, 7); // YYYY-MM
    byMonth.set(key, r); // each later row overwrites — ends up with last day of month
  }
  return [...byMonth.values()];
}
// Money-weighted IRR for a DCA stream: −initialValue at t=0, −monthlyContrib for t=1..N, +finalValue at t=N.
// Returns monthly rate (annualize via (1+r)^12 − 1). Bisection over a wide bracket.
function computeMonthlyIRR(initialValue, monthlyContrib, months, finalValue) {
  if (!Number.isFinite(initialValue) || initialValue <= 0 || months < 1) return null;
  const npv = (r) => {
    let p = -initialValue;
    if (Math.abs(r) < 1e-12) p -= monthlyContrib * months;
    else for (let m = 1; m <= months; m++) p -= monthlyContrib / Math.pow(1 + r, m);
    p += finalValue / Math.pow(1 + r, months);
    return p;
  };
  let lo = -0.10, hi = 0.50; // monthly rate bracket: −10%/mo to +50%/mo
  let nLo = npv(lo), nHi = npv(hi);
  if (!Number.isFinite(nLo) || !Number.isFinite(nHi)) return null;
  if (nLo * nHi > 0) return null; // no sign change in bracket
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    const nMid = npv(mid);
    if (Math.abs(nMid) < 0.005 || (hi - lo) < 1e-9) return mid;
    if (nMid * nLo > 0) { lo = mid; nLo = nMid; } else { hi = mid; nHi = nMid; }
  }
  return (lo + hi) / 2;
}

function computeHistoryMetrics(rows) {
  const closes = rows.map(r => r.close);
  const n = closes.length;
  const monthlyRets = [];
  for (let i = 1; i < n; i++) monthlyRets.push(closes[i] / closes[i - 1] - 1);
  const cagrOver = (months) => {
    if (n <= months) return null;
    const past = closes[n - 1 - months];
    const latest = closes[n - 1];
    if (!past || past <= 0) return null;
    const years = months / 12;
    return +((Math.pow(latest / past, 1 / years) - 1) * 100).toFixed(2);
  };
  const meanRet = monthlyRets.length ? monthlyRets.reduce((s, x) => s + x, 0) / monthlyRets.length : 0;
  const variance = monthlyRets.length > 1
    ? monthlyRets.reduce((s, x) => s + (x - meanRet) ** 2, 0) / (monthlyRets.length - 1)
    : 0;
  const vol = Math.sqrt(variance) * Math.sqrt(12) * 100;
  let peak = closes[0], maxDD = 0;
  for (const c of closes) {
    if (c > peak) peak = c;
    const dd = (c / peak - 1) * 100;
    if (dd < maxDD) maxDD = dd;
  }
  return {
    cagr1y:  cagrOver(12),
    cagr3y:  cagrOver(36),
    cagr5y:  cagrOver(60),
    cagr10y: cagrOver(120),
    cagr15y: cagrOver(180),
    cagr20y: cagrOver(240),
    vol: +vol.toFixed(2),
    maxDD: +maxDD.toFixed(2),
    nPoints: n,
    firstDate: rows[0]?.date,
    lastDate: rows[n - 1]?.date,
  };
}

      }

  } catch (e) { /* fall through */ }
  return null;
}

// ============================================================
// MARKET SIMULATION ENGINE
// ============================================================
// SPY-driven Geometric Brownian Motion. Per-ticker prices follow CAPM:
//   r_ticker = β × r_SPY + ε,  where ε ~ N(0, σ_idio² × dt)
// Three paths: bearish, average, bullish — share the same noise but
// differ in drift bias. User picks an interval (1D, 1W, 1M, 3M, 1Y) for
// the time horizon being simulated.
// ============================================================
const INTERVALS = {
  '1D':  { label: '1 Day',    horizon: 1/252, frames: 60 },
  '1W':  { label: '1 Week',   horizon: 5/252, frames: 60 },
  '1M':  { label: '1 Month',  horizon: 21/252, frames: 80 },
  '3M':  { label: '3 Months', horizon: 63/252, frames: 100 },
  '1YR': { label: '1 Year',   horizon: 1.0,   frames: 120 },
};
// Drift bias adjustments (annualized %):
// Bear: drift halved, vol amplified slightly
// Bull: drift +50% above baseline
// Average: baseline CAPM expected return
const SPY_BASE_DRIFT = RM / 100;  // 0.175
const SPY_BASE_VOL = 14.5 / 100;
const BIAS_FACTORS = {
  bull: { driftMult: 1.5, volMult: 0.85 },
  avg:  { driftMult: 1.0, volMult: 1.0 },
  bear: { driftMult: -0.5, volMult: 1.25 },
};

// Generate one GBM path. Returns array of {step, price} where price starts at startPrice.
// Uses seeded randoms for reproducibility, with `seed` stepping each call.
function generateSpyPath(startPrice, horizon, frames, bias, seed) {
  const dt = horizon / frames;
  const { driftMult, volMult } = BIAS_FACTORS[bias];
  const drift = SPY_BASE_DRIFT * driftMult;
  const vol = SPY_BASE_VOL * volMult;
  const path = [{ step: 0, price: startPrice, t: 0 }];
  let p = startPrice;
  for (let i = 1; i <= frames; i++) {
    const z = boxMuller(seed + i * 7.31);
    const ret = (drift - 0.5 * vol * vol) * dt + vol * Math.sqrt(dt) * z;
    p = p * Math.exp(ret);
    path.push({ step: i, price: p, t: i * dt });
  }
  return path;
}

// Generate per-ticker price at a single point in time given SPY's return.
// β-weighted with idiosyncratic noise. Returns multiplier (new/start).
function tickerReturnFromSpy(ticker, spyLogReturn, dt, seed) {
  const data = TICKER_DB[ticker];
  if (!data) return 1;
  const beta = data.beta;
  const sigmaT = data.vol / 100;
  // Idiosyncratic variance: σ_idio² = σ_ticker² − β² × σ_spy²  (capped at zero)
  const sigmaIdio = Math.sqrt(Math.max(0, sigmaT * sigmaT - beta * beta * SPY_BASE_VOL * SPY_BASE_VOL));
  const z = boxMuller(seed * 31.7 + ticker.charCodeAt(0) + ticker.charCodeAt(ticker.length - 1));
  const idioReturn = sigmaIdio * Math.sqrt(dt) * z;
  return Math.exp(beta * spyLogReturn + idioReturn);
}

function useViewport() {
  const [size, setSize] = useState(() => ({
    w: typeof window !== 'undefined' ? window.innerWidth : 1200,
    h: typeof window !== 'undefined' ? window.innerHeight : 800,
  }));
  useEffect(() => {
    const handler = () => setSize({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return {
    ...size,
    isMobile: size.w < 640,
    isTablet: size.w >= 640 && size.w < 1024,
    isDesktop: size.w >= 1024,
  };
}

// MAIN APP
// ============================================================
// ============================================================
// PERSISTENCE SCHEMA — versioned migrations. Each localStorage payload
// carries `_v` (schemaVersion). On read, we run migrations to bring older
// snapshots up to CURRENT_SCHEMA_VERSION before consuming them.
// Future shape changes: bump CURRENT_SCHEMA_VERSION + add a migration step.
// ============================================================
const CURRENT_SCHEMA_VERSION = 1;
const PERSISTED_KEYS = {
  tabs:          'qt_tabs_v1',
  activeTab:     'qt_active_tab_v1',
  tax:           'qt_tax_v1',
  ui:            'qt_ui_v1',
  history:       'qt_value_history_v1',
  historyCache:  'qt_history_v1',
  theme:         'qt_theme',
  finnhub:       'finnhub_key',
  tiingo:        'tiingo_key',
  gistToken:     'qt_gist_token_v1',
  gistId:        'qt_gist_id_v1',
  gistLastSync:  'qt_gist_last_sync_v1',
  embedHash:     'qt_embed_hash_v1',
  autoFetch:     'qt_autofetch_v1',
  seedJoint:     'qt_seed_joint_storage_v1',
};

// Migrations registry. Each entry: { from, to, migrate(parsed) }.
// Keep migrations PURE — read parsed object, return new shape.
// Empty for now (we're at v1); future shape changes add migrations here.
const SCHEMA_MIGRATIONS = [
  // Example for future use:
  // { from: 1, to: 2, migrate: (s) => ({ ...s, newField: defaultValue, _v: 2 }) },
];

function migrateState(parsed) {
  if (parsed == null || typeof parsed !== 'object') return parsed;
  let current = parsed;
  // Pre-versioning data has no _v field — treat as v1.
  let v = Number.isFinite(current._v) ? current._v : 1;
  while (v < CURRENT_SCHEMA_VERSION) {
    const step = SCHEMA_MIGRATIONS.find(s => s.from === v);
    if (!step) {
      console.warn(`[schema] No migration from v${v} to v${v + 1}; using as-is.`);
      break;
    }
    try { current = step.migrate(current); v = step.to; }
    catch (e) { console.error(`[schema] Migration v${v}→v${step.to} failed:`, e); break; }
  }
  if (!Number.isFinite(current._v)) current._v = CURRENT_SCHEMA_VERSION;
  return current;
}

// Wrappers that stamp _v on write and run migrations on read.
function readJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    const parsed = JSON.parse(raw);
    // Only run migration on object shapes; raw arrays/primitives passed through
    if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) return migrateState(parsed);
    return parsed;
  } catch (e) { console.warn(`[storage] read ${key} failed:`, e.message); return fallback; }
}
function writeJSON(key, value) {
  try {
    const stamped = (value && typeof value === 'object' && !Array.isArray(value))
      ? { ...value, _v: CURRENT_SCHEMA_VERSION }
      : value;
    localStorage.setItem(key, JSON.stringify(stamped));
  } catch (e) { console.warn(`[storage] write ${key} failed:`, e.message); }
}

// ============================================================
// EMBEDDED FILE STATE — read/write to <script id="qt-saved-state">
// Lets users share the HTML file across machines and pick up where they left off.
// ============================================================
const EMBED_STATE_ID = 'qt-saved-state';
const EMBED_LAST_HASH_KEY = 'qt_embed_hash_v1';
function readEmbeddedState() {
  try {
    const el = document.getElementById(EMBED_STATE_ID);
    if (!el) return null;
    const raw = (el.textContent || '').trim();
    if (!raw || raw === '{}' || raw === '') return null;
    return JSON.parse(raw);
  } catch { return null; }
}
function quickHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return String(h);
}
// Build a downloadable HTML clone with current state baked into the marker script.
function exportFileWithState(stateObj) {
  const root = document.getElementById('root');
  const stateEl = document.getElementById(EMBED_STATE_ID);
  if (!root || !stateEl) return false;
  const rootBackup = root.innerHTML;
  const prevState = stateEl.textContent;
  try {
    root.innerHTML = ''; // strip React-rendered DOM so the file ships pristine
    stateEl.textContent = JSON.stringify(stateObj);
    const source = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([source], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 16);
    a.href = url; a.download = `quant_terminal_${stamp}.html`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    return true;
  } finally {
    stateEl.textContent = prevState;
    root.innerHTML = rootBackup;
  }
}

// ============================================================
// GIST SYNC — push/pull state to a private GitHub gist for cross-device sync
// PAT needs only the `gist` scope. Gists keep their own revision history.
// ============================================================
const GIST_FILE = 'quant_terminal_state.json';
async function gistApi(path, options, token) {
  const res = await fetch(`https://api.github.com${path}`, {
    ...options,
    headers: {
      'Accept': 'application/vnd.github+json',
      'Authorization': `Bearer ${token}`,
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json',
      ...((options && options.headers) || {}),
    },
  });
  if (!res.ok) {
    let detail = '';
    try { detail = (await res.json()).message || ''; } catch {}
    throw new Error(`GitHub ${res.status}${detail ? ' · ' + detail : ''}`);
  }
  return res.json();
}
async function createStateGist(token, state) {
  return gistApi('/gists', {
    method: 'POST',
    body: JSON.stringify({
      description: 'Quant Terminal · Portfolio Lab state',
      public: false,
      files: { [GIST_FILE]: { content: JSON.stringify(state, null, 2) } },
    }),
  }, token);
}
async function updateStateGist(token, gistId, state) {
  return gistApi(`/gists/${gistId}`, {
    method: 'PATCH',
    body: JSON.stringify({
      files: { [GIST_FILE]: { content: JSON.stringify(state, null, 2) } },
    }),
  }, token);
}
async function fetchStateGist(token, gistId, sha) {
  const path = sha ? `/gists/${gistId}/${sha}` : `/gists/${gistId}`;
  const data = await gistApi(path, {}, token);
  const file = data.files && data.files[GIST_FILE];
  if (!file) throw new Error('State file missing in gist');
  let content = file.content;
  if (file.truncated && file.raw_url) {
    const r = await fetch(file.raw_url, { headers: { 'Authorization': `Bearer ${token}` } });
    content = await r.text();
  }
  return { state: JSON.parse(content), history: data.history || [], updatedAt: data.updated_at };
}

// Run before App mounts: if the embedded state script holds a different payload
// than last seen, copy it into localStorage so this machine picks up where the
// shared file left off. Last seen is tracked by hash so we don't clobber edits
// the user made after import.
(function hydrateFromEmbedded() {
  try {
    if (typeof document === 'undefined' || typeof localStorage === 'undefined') return;
    const el = document.getElementById(EMBED_STATE_ID);
    if (!el) return;
    const raw = (el.textContent || '').trim();
    if (!raw || raw === '{}') return;
    const hash = quickHash(raw);
    if (localStorage.getItem(EMBED_LAST_HASH_KEY) === hash) return;
    const state = JSON.parse(raw);
    if (state && typeof state === 'object') {
      if (Array.isArray(state.tabs))     localStorage.setItem('qt_tabs_v1', JSON.stringify(state.tabs));
      if (state.activeTabId)             localStorage.setItem('qt_active_tab_v1', state.activeTabId);
      if (state.taxSettings)             localStorage.setItem('qt_tax_v1', JSON.stringify(state.taxSettings));
      if (state.theme)                   localStorage.setItem('qt_theme', state.theme);
      if (state.ui)                      localStorage.setItem('qt_ui_v1', JSON.stringify(state.ui));
      if (state.valueHistory)            localStorage.setItem('qt_value_history_v1', JSON.stringify(state.valueHistory));
      localStorage.setItem(EMBED_LAST_HASH_KEY, hash);
    }
  } catch {}
})();

function encodePortfolio(portfolio) {
  try {
    const compact = portfolio.map(p => [p.ticker, +p.shares.toFixed(6), +p.costPerShare.toFixed(4), p.dca || 0, p.dcaFreq || 'weekly']);
    return btoa(unescape(encodeURIComponent(JSON.stringify(compact)))).replace(/=+$/, '');
  } catch { return ''; }
}
function decodePortfolio(hash) {
  try {
    const pad = hash + '==='.slice((hash.length + 3) % 4);
    const json = decodeURIComponent(escape(atob(pad)));
    const arr = JSON.parse(json);
    if (!Array.isArray(arr)) return null;
    return arr.map(([ticker, shares, costPerShare, dca, dcaFreq]) => ({
      ticker, shares, costPerShare, dca: dca || 0, dcaFreq: dcaFreq || 'weekly',
    })).filter(p => TICKER_DB[p.ticker]);
  } catch { return null; }
}

// ============================================================
// IN-BROWSER TEST SUITE — exposed at ?test=1
// Verifies the core quant math against analytic ground truth.
// ============================================================
function buildTestSuite() {
  const tests = [];
  const approxEq = (a, b, tol = 0.01) => ({
    ok: Math.abs(a - b) <= tol,
    msg: `${typeof a === 'number' ? a.toFixed(6) : a} vs ${typeof b === 'number' ? b.toFixed(6) : b} · Δ ${Math.abs(a - b).toExponential(2)} · tol ${tol}`,
  });

  // ── IRR
  tests.push({
    group: 'IRR',
    name: 'No DCA, 12mo @ 10% → IRR = 10%',
    fn: () => {
      const v = 1000 * Math.pow(1 + Math.pow(1.10, 1/12) - 1, 12); // = 1100
      const mIRR = computeMonthlyIRR(1000, 0, 12, v);
      const aIRR = (Math.pow(1 + mIRR, 12) - 1) * 100;
      return approxEq(aIRR, 10, 0.05);
    },
  });
  tests.push({
    group: 'IRR',
    name: 'Negative 8% over 24mo → IRR = -8%',
    fn: () => {
      const monthly = Math.pow(0.92, 1/12) - 1;
      const v = 1000 * Math.pow(1 + monthly, 24);
      const mIRR = computeMonthlyIRR(1000, 0, 24, v);
      const aIRR = (Math.pow(1 + mIRR, 12) - 1) * 100;
      return approxEq(aIRR, -8, 0.1);
    },
  });
  tests.push({
    group: 'IRR',
    name: 'DCA stream at 10% → IRR ≈ 10%',
    fn: () => {
      const r = Math.pow(1.10, 1/12) - 1;
      let v = 1000;
      for (let m = 1; m <= 60; m++) v = v * (1 + r) + 500;
      const mIRR = computeMonthlyIRR(1000, 500, 60, v);
      const aIRR = (Math.pow(1 + mIRR, 12) - 1) * 100;
      return approxEq(aIRR, 10, 0.1);
    },
  });

  // ── Compounding conversion
  tests.push({
    group: 'Compounding',
    name: '(1+10%)^(1/12) compounded 12× = 10% exactly',
    fn: () => {
      const r = Math.pow(1.10, 1/12) - 1;
      const annual = (Math.pow(1 + r, 12) - 1) * 100;
      return approxEq(annual, 10, 1e-9);
    },
  });
  tests.push({
    group: 'Compounding',
    name: 'Nominal r/12 is NOT effective (the bug we fixed)',
    fn: () => {
      const wrong = (Math.pow(1 + 0.10/12, 12) - 1) * 100;
      // wrong should be 10.47%, NOT 10%. Confirms we know the difference.
      return approxEq(wrong, 10.47, 0.01);
    },
  });

  // ── Horizon mode taper
  const horizonRate = (ttm, capm, years) => {
    const w = Math.exp(-Math.max(0, years) / 5);
    return w * ttm + (1 - w) * capm;
  };
  tests.push({
    group: 'Horizon',
    name: 'Year 0 == TTM',
    fn: () => approxEq(horizonRate(30, 10, 0), 30, 1e-9),
  });
  tests.push({
    group: 'Horizon',
    name: 'Year 30 → CAPM (within 1% of pure CAPM)',
    fn: () => approxEq(horizonRate(30, 10, 30), 10, 0.1),
  });
  tests.push({
    group: 'Horizon',
    name: 'Year 5 ≈ 37% TTM + 63% CAPM',
    fn: () => approxEq(horizonRate(30, 10, 5), 0.368 * 30 + 0.632 * 10, 0.02),
  });

  // ── Covariance / variance
  tests.push({
    group: 'Stats',
    name: 'Covariance of identical series = variance',
    fn: () => {
      const a = [0.01, -0.02, 0.03, -0.01, 0.02];
      return approxEq(covariance(a, a), Math.pow(stdev(a), 2), 1e-9);
    },
  });
  tests.push({
    group: 'Stats',
    name: 'Covariance of independent random series ≈ 0',
    fn: () => {
      const a = []; const b = [];
      for (let i = 0; i < 100; i++) { a.push(boxMuller(i + 1) * 0.01); b.push(boxMuller(i + 1.5) * 0.01); }
      const c = covariance(a, b);
      // Independent samples should give |cov| < 0.00005 (well below the variance scale of 0.0001)
      return { ok: Math.abs(c) < 0.0001, msg: `|cov|=${Math.abs(c).toExponential(2)} < 0.0001` };
    },
  });

  // ── Cholesky
  tests.push({
    group: 'Matrix',
    name: 'Cholesky: L Lᵀ reconstructs PSD matrix',
    fn: () => {
      const C = [[4, 2, 1], [2, 5, 3], [1, 3, 6]];
      const L = cholesky(C);
      let maxErr = 0;
      for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) {
        let sum = 0;
        for (let k = 0; k < 3; k++) sum += L[i][k] * L[j][k];
        maxErr = Math.max(maxErr, Math.abs(sum - C[i][j]));
      }
      return { ok: maxErr < 1e-6, msg: `max reconstruction err = ${maxErr.toExponential(2)}` };
    },
  });

  // ── Matrix inverse (general)
  tests.push({
    group: 'Matrix',
    name: 'Inverse: M · M⁻¹ = I (3×3)',
    fn: () => {
      const M = [[2, 1, 0], [1, 3, 1], [0, 1, 2]];
      const Mi = matrixInverse(M);
      if (!Mi) return { ok: false, msg: 'returned null' };
      let maxOff = 0, maxDiag = 0;
      for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) {
        let s = 0;
        for (let k = 0; k < 3; k++) s += M[i][k] * Mi[k][j];
        if (i === j) maxDiag = Math.max(maxDiag, Math.abs(s - 1));
        else maxOff = Math.max(maxOff, Math.abs(s));
      }
      return { ok: maxDiag < 1e-9 && maxOff < 1e-9, msg: `diag err ${maxDiag.toExponential(2)} · off-diag err ${maxOff.toExponential(2)}` };
    },
  });
  tests.push({
    group: 'Matrix',
    name: 'Inverse: singular matrix returns null',
    fn: () => {
      const M = [[1, 2], [2, 4]]; // rank 1
      return { ok: matrixInverse(M) === null, msg: 'null returned as expected' };
    },
  });

  // ── OLS regression
  tests.push({
    group: 'OLS',
    name: 'Recover known coefficients from synthetic data',
    fn: () => {
      // y = 0.5 + 1.2x + noise (small)
      const X = [], y = [];
      for (let i = 0; i < 50; i++) {
        const x = i * 0.1;
        const noise = boxMuller(i + 0.7) * 0.001;
        X.push([1, x]);
        y.push(0.5 + 1.2 * x + noise);
      }
      const r = olsRegression(X, y);
      if (!r) return { ok: false, msg: 'returned null' };
      return { ok: Math.abs(r.beta[0] - 0.5) < 0.01 && Math.abs(r.beta[1] - 1.2) < 0.01,
        msg: `intercept ${r.beta[0].toFixed(4)} (expected 0.5), slope ${r.beta[1].toFixed(4)} (expected 1.2)` };
    },
  });

  // ── Tangency portfolio
  tests.push({
    group: 'Optim',
    name: 'Tangency weights sum to 1 (long-only)',
    fn: () => {
      const C = [[0.04, 0.01, 0.005], [0.01, 0.09, 0.02], [0.005, 0.02, 0.16]];
      const mu = [8, 12, 15]; // %
      const w = longOnlyTangency(C, mu, 4.42);
      if (!w) return { ok: false, msg: 'returned null' };
      const sum = w.reduce((s, x) => s + x, 0);
      const allNonNeg = w.every(x => x >= -1e-9);
      return { ok: Math.abs(sum - 1) < 1e-6 && allNonNeg, msg: `sum=${sum.toFixed(6)}, all ≥ 0: ${allNonNeg}` };
    },
  });

  // ── VaR / CVaR ordering
  tests.push({
    group: 'Risk',
    name: 'CVaR ≥ VaR (tail mean ≥ tail threshold)',
    fn: () => {
      const rets = [-0.20, -0.15, -0.10, -0.05, 0, 0.02, 0.05, 0.08, 0.10, 0.15];
      const v = empiricalVaR(rets, 0.9);
      const c = empiricalCVaR(rets, 0.9);
      return { ok: c >= v - 1e-9, msg: `VaR=${v.toFixed(4)}, CVaR=${c.toFixed(4)}` };
    },
  });

  // ── Tax: marginal rate
  tests.push({
    group: 'Tax',
    name: 'LTCG rate brackets correctly for single filer at $150K',
    fn: () => approxEq(ltcgRate('single', 150000) * 100, 15, 1e-9),
  });
  tests.push({
    group: 'Tax',
    name: 'NIIT triggers above threshold',
    fn: () => ({ ok: niitApplies('single', 250000) && !niitApplies('single', 150000),
      msg: `>250K: triggers, <200K: no` }),
  });

  return tests;
}

function TestRunner() {
  const tests = React.useMemo(() => buildTestSuite(), []);
  const results = React.useMemo(() => tests.map(t => {
    try { const r = t.fn(); return { ...t, ok: r.ok, msg: r.msg }; }
    catch (e) { return { ...t, ok: false, msg: `THREW: ${e.message}` }; }
  }), [tests]);
  const passed = results.filter(r => r.ok).length;
  const failed = results.length - passed;
  const groups = [...new Set(tests.map(t => t.group))];

  return (
    <div style={{ padding: 32, maxWidth: 900, margin: '0 auto', fontFamily: 'inherit' }}>
      <div style={{ marginBottom: 24 }}>
        <div className="label-cap" style={{ color: 'var(--accent-cyan)', marginBottom: 4 }}>Quant Terminal · Test Runner</div>
        <h1 className="h1-title" style={{ margin: 0, fontSize: 28, fontWeight: 700, letterSpacing: '-0.03em' }}>
          {failed === 0 ? '✓ All tests passing' : `✗ ${failed} test${failed === 1 ? '' : 's'} failed`}
        </h1>
        <div style={{ fontSize: 14, color: 'var(--text-2)', marginTop: 6 }}>
          {passed} / {results.length} passed · {groups.length} groups · {' '}
          <a href={window.location.pathname} style={{ color: 'var(--accent)' }}>← back to app</a>
        </div>
      </div>

      {groups.map(g => {
        const groupResults = results.filter(r => r.group === g);
        const groupPass = groupResults.filter(r => r.ok).length;
        const allOk = groupPass === groupResults.length;
        return (
          <div key={g} className="card" style={{ padding: 18, marginBottom: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
              <div className="label-cap" style={{ color: allOk ? 'var(--accent-green)' : 'var(--accent-red)' }}>{g}</div>
              <div className="stat-num" style={{ fontSize: 12, color: 'var(--text-3)' }}>{groupPass}/{groupResults.length}</div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {groupResults.map((r, i) => (
                <div key={i} style={{
                  padding: '10px 12px', borderRadius: 8,
                  background: r.ok ? 'rgba(48,209,88,0.06)' : 'rgba(255,69,58,0.08)',
                  border: `1px solid ${r.ok ? 'rgba(48,209,88,0.25)' : 'rgba(255,69,58,0.3)'}`,
                }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: r.ok ? 'var(--accent-green)' : 'var(--accent-red)', marginBottom: 4 }}>
                    {r.ok ? '✓' : '✗'} {r.name}
                  </div>
                  <div className="mono" style={{ fontSize: 11, color: 'var(--text-3)', lineHeight: 1.4 }}>{r.msg}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      <div style={{ marginTop: 24, padding: 14, fontSize: 11, color: 'var(--text-4)', lineHeight: 1.6 }}>
        Test mode active. Open without <span className="mono">?test=1</span> to return to the dashboard.
      </div>
    </div>
  );
}

function App() {
  // Gate: bypass the entire app and render the test runner when ?test=1 is in the URL
  if (typeof window !== 'undefined' && new URLSearchParams(window.location.search).get('test') === '1') {
    return <TestRunner />;
  }
  const vp = useViewport();
  const isMobile = vp.isMobile;
  const isTablet = vp.isTablet;
  const isDesktop = vp.isDesktop;

  // Scroll-detected compact mode for the sticky top stats row — rAF-throttled,
  // and only triggers a state update when the boolean actually flips
  const [stickyCompact, setStickyCompact] = useState(false);
  useEffect(() => {
    let frame = 0;
    const handler = () => {
      if (frame) return;
      frame = requestAnimationFrame(() => {
        frame = 0;
        const next = window.scrollY > 90;
        setStickyCompact(prev => prev === next ? prev : next);
      });
    };
    window.addEventListener('scroll', handler, { passive: true });
    handler();
    return () => {
      if (frame) cancelAnimationFrame(frame);
      window.removeEventListener('scroll', handler);
    };
  }, []);

  // Theme — light / dark
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('qt_theme') || 'dark'; } catch { return 'dark'; }
  });
  useEffect(() => {
    try { localStorage.setItem('qt_theme', theme); } catch {}
    const root = document.documentElement;
    if (theme === 'light') {
      root.style.setProperty('--bg-0', '#f5f5f7');
      root.style.setProperty('--bg-1', '#ffffff');
      root.style.setProperty('--bg-2', '#f0f0f3');
      root.style.setProperty('--bg-3', '#e5e5ea');
      root.style.setProperty('--border-1', 'rgba(0,0,0,0.08)');
      root.style.setProperty('--border-2', 'rgba(0,0,0,0.14)');
      root.style.setProperty('--border-3', 'rgba(0,0,0,0.22)');
      root.style.setProperty('--text-1', '#1c1c1e');
      root.style.setProperty('--text-2', '#48484a');
      root.style.setProperty('--text-3', '#6e6e73');
      root.style.setProperty('--text-4', '#aeaeb2');
    } else {
      root.style.setProperty('--bg-0', '#000000');
      root.style.setProperty('--bg-1', '#0a0a0c');
      root.style.setProperty('--bg-2', '#131316');
      root.style.setProperty('--bg-3', '#1c1c1f');
      root.style.setProperty('--border-1', 'rgba(255,255,255,0.06)');
      root.style.setProperty('--border-2', 'rgba(255,255,255,0.10)');
      root.style.setProperty('--border-3', 'rgba(255,255,255,0.16)');
      root.style.setProperty('--text-1', '#f5f5f7');
      root.style.setProperty('--text-2', '#a1a1a6');
      root.style.setProperty('--text-3', '#6e6e73');
      root.style.setProperty('--text-4', '#48484a');
    }
  }, [theme]);

  // ============================================================
  // TABS — multi-portfolio workspaces persisted to localStorage
  // ============================================================
  const TABS_KEY = 'qt_tabs_v1';
  const ACTIVE_TAB_KEY = 'qt_active_tab_v1';
  const newTabId = () => 't_' + Math.random().toString(36).slice(2, 9);

  const loadInitialTabs = () => {
    try {
      const raw = localStorage.getItem(TABS_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length) return parsed;
      }
    } catch {}
    return [{ id: newTabId(), name: 'Main', portfolio: INITIAL_PORTFOLIO, savedAt: null }];
  };
  const initialTabsValue = loadInitialTabs();
  const loadInitialActiveId = () => {
    try {
      const id = localStorage.getItem(ACTIVE_TAB_KEY);
      if (id && initialTabsValue.some(t => t.id === id)) return id;
    } catch {}
    return initialTabsValue[0].id;
  };
  const [tabs, setTabs] = useState(initialTabsValue);
  const [activeTabId, setActiveTabId] = useState(loadInitialActiveId);
  const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0];

  // Core portfolio state — URL hash wins, else active tab's saved portfolio
  const [portfolio, setPortfolio] = useState(() => {
    if (typeof window !== 'undefined' && window.location.hash.startsWith('#p=')) {
      const decoded = decodePortfolio(window.location.hash.slice(3));
      if (decoded && decoded.length) return decoded;
    }
    return activeTab.portfolio || [];
  });

  // Sync portfolio → URL hash (debounced via effect)
  useEffect(() => {
    if (typeof window === 'undefined') return;
    const encoded = encodePortfolio(portfolio);
    const next = encoded ? `#p=${encoded}` : '';
    if (window.location.hash !== next) {
      try { history.replaceState(null, '', `${window.location.pathname}${window.location.search}${next}`); } catch {}
    }
  }, [portfolio]);

  // Dirty detection: current portfolio differs from saved tab snapshot
  const activeTabDirty = useMemo(() => {
    if (!activeTab) return false;
    try { return JSON.stringify(activeTab.portfolio) !== JSON.stringify(portfolio); }
    catch { return true; }
  }, [activeTab, portfolio]);

  const [saveToast, setSaveToast] = useState('');
  const [editingTabId, setEditingTabId] = useState(null);
  const [titleEditing, setTitleEditing] = useState(false);

  // ============================================================
  // TAX SETTINGS — persisted to localStorage
  // ============================================================
  const TAX_KEY = 'qt_tax_v1';
  const [taxSettings, setTaxSettings] = useState(() => {
    try {
      const raw = localStorage.getItem(TAX_KEY);
      if (raw) return { filing: 'single', income: 150000, stateRate: 0, holdings: {}, ...JSON.parse(raw) };
    } catch {}
    return { filing: 'single', income: 150000, stateRate: 0, holdings: {} }; // holdings: ticker -> 'lt'|'st'
  });
  useEffect(() => { try { localStorage.setItem(TAX_KEY, JSON.stringify(taxSettings)); } catch {} }, [taxSettings]);
  const setTax = (patch) => setTaxSettings(s => ({ ...s, ...patch }));
  const setHoldingPeriod = (ticker, period) => setTaxSettings(s => ({ ...s, holdings: { ...s.holdings, [ticker]: period } }));

  const persistTabs = (nextTabs, nextActiveId) => {
    try {
      localStorage.setItem(TABS_KEY, JSON.stringify(nextTabs));
      if (nextActiveId) localStorage.setItem(ACTIVE_TAB_KEY, nextActiveId);
    } catch {}
  };

  const saveActiveTab = async () => {
    const now = Date.now();
    const next = tabs.map(t => t.id === activeTabId ? { ...t, portfolio, savedAt: now } : t);
    setTabs(next);
    persistTabs(next, activeTabId);
    const nextHistory = computeNextHistory(valueHistory);
    setValueHistory(nextHistory);
    // Auto-push to gist when configured
    if (gistToken && gistId) {
      setSaveToast('Saved · syncing…');
      try {
        const state = {
          v: 1, savedAt: now,
          tabs: next, activeTabId, taxSettings, theme,
          ui: buildUiState(), valueHistory: nextHistory,
        };
        await updateStateGist(gistToken, gistId, state);
        markSynced();
        setSaveToast('Saved · synced ☁');
      } catch {
        setSaveToast('Saved · sync failed');
      }
      setTimeout(() => setSaveToast(''), 2000);
    } else {
      setSaveToast('Saved');
      setTimeout(() => setSaveToast(''), 1500);
    }
  };

  // ============================================================
  // GIST SYNC — state, handlers
  // ============================================================
  const GIST_TOKEN_KEY = 'qt_gist_token_v1';
  const GIST_ID_KEY = 'qt_gist_id_v1';
  const GIST_LAST_SYNC_KEY = 'qt_gist_last_sync_v1';
  const [gistToken, setGistToken] = useState(() => { try { return localStorage.getItem(GIST_TOKEN_KEY) || DEFAULT_GIST_TOKEN; } catch { return DEFAULT_GIST_TOKEN; } });
  const [gistId, setGistId] = useState(() => { try { return localStorage.getItem(GIST_ID_KEY) || DEFAULT_GIST_ID; } catch { return DEFAULT_GIST_ID; } });
  const [lastSyncAt, setLastSyncAt] = useState(() => { try { const v = +localStorage.getItem(GIST_LAST_SYNC_KEY); return Number.isFinite(v) && v > 0 ? v : null; } catch { return null; } });
  const [showSync, setShowSync] = useState(false);
  const [showGistToken, setShowGistToken] = useState(false);
  const [syncStatus, setSyncStatus] = useState({ state: 'idle', message: '' });
  const [syncHistory, setSyncHistory] = useState([]);
  useEffect(() => { try { gistToken ? localStorage.setItem(GIST_TOKEN_KEY, gistToken) : localStorage.removeItem(GIST_TOKEN_KEY); } catch {} }, [gistToken]);
  useEffect(() => { try { gistId ? localStorage.setItem(GIST_ID_KEY, gistId) : localStorage.removeItem(GIST_ID_KEY); } catch {} }, [gistId]);

  // Auto-pull the latest gist state once on mount, then refresh prices for any new tickers
  const didInitialPullRef = useRef(false);
  useEffect(() => {
    if (didInitialPullRef.current) return;
    if (!gistToken || !gistId) return;
    didInitialPullRef.current = true;
    const id = setTimeout(async () => {
      await cloudPull(undefined, { silent: true });
      // After pull, portfolio may contain new tickers — refresh live prices
      setTimeout(() => { refreshAllPrices(); }, 200);
    }, 500);
    return () => clearTimeout(id);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ============================================================
  // VALUE HISTORY — append a snapshot each time state is saved/pushed.
  // Persisted locally and bundled into the gist so charts work across machines.
  // ============================================================
  const HISTORY_KEY = 'qt_value_history_v1';
  const [valueHistory, setValueHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}') || {}; }
    catch { return {}; }
  });
  useEffect(() => {
    const id = setTimeout(() => { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(valueHistory)); } catch {} }, 400);
    return () => clearTimeout(id);
  }, [valueHistory]);

  // Build a snapshot using the CURRENT live state; returns the next history map
  // (we don't rely on setState's async closure for save flows).
  const computeNextHistory = (history) => {
    const snap = {
      at: Date.now(),
      value: +(totalValue || 0).toFixed(2),
      costBasis: +(baseTotalValue || 0).toFixed(2),
      n: portfolio.length,
    };
    const next = { ...history };
    const list = next[activeTabId] ? [...next[activeTabId]] : [];
    // Coalesce snapshots within 30s — replace the latest rather than spam
    if (list.length && Date.now() - list[list.length - 1].at < 30000) {
      list[list.length - 1] = snap;
    } else {
      list.push(snap);
    }
    if (list.length > 5000) list.splice(0, list.length - 5000);
    next[activeTabId] = list;
    return next;
  };

  const recordSnapshot = () => {
    setValueHistory(h => computeNextHistory(h));
  };

  const buildExportState = () => {
    const nextHistory = computeNextHistory(valueHistory);
    return {
      v: 1, savedAt: Date.now(),
      tabs: tabs.map(t => t.id === activeTabId ? { ...t, portfolio, savedAt: Date.now() } : t),
      activeTabId, taxSettings, theme, ui: buildUiState(),
      valueHistory: nextHistory,
    };
  };

  const applyImportedState = (state) => {
    if (!state || typeof state !== 'object') return;
    if (Array.isArray(state.tabs) && state.tabs.length) {
      const target = state.activeTabId && state.tabs.find(t => t.id === state.activeTabId) || state.tabs[0];
      setTabs(state.tabs);
      setActiveTabId(target.id);
      setPortfolio(target.portfolio || []);
      persistTabs(state.tabs, target.id);
    }
    if (state.taxSettings) setTaxSettings(state.taxSettings);
    if (state.theme) setTheme(state.theme);
    if (state.ui) applyUiState(state.ui);
    if (state.valueHistory && typeof state.valueHistory === 'object') {
      // Merge: keep local entries newer than what's in the gist for current device
      setValueHistory(local => {
        const merged = { ...state.valueHistory };
        Object.keys(local).forEach(tid => {
          const remote = merged[tid] || [];
          const localList = local[tid] || [];
          // Concatenate, dedupe by `at` timestamp, sort
          const combined = [...remote, ...localList]
            .reduce((acc, s) => (acc[s.at] = s, acc), {});
          merged[tid] = Object.values(combined).sort((a, b) => a.at - b.at);
          if (merged[tid].length > 5000) merged[tid].splice(0, merged[tid].length - 5000);
        });
        return merged;
      });
    }
    resetTransientState();
  };

  const markSynced = () => {
    const now = Date.now();
    setLastSyncAt(now);
    try { localStorage.setItem(GIST_LAST_SYNC_KEY, String(now)); } catch {}
  };

  const cloudPush = async () => {
    if (!gistToken) { setSyncStatus({ state: 'error', message: 'Add a PAT first' }); return; }
    setSyncStatus({ state: 'busy', message: 'Pushing…' });
    try {
      const state = buildExportState();
      // Persist the snapshot locally too so refresh keeps the new point
      if (state.valueHistory) setValueHistory(state.valueHistory);
      if (!gistId) {
        const created = await createStateGist(gistToken, state);
        setGistId(created.id);
      } else {
        await updateStateGist(gistToken, gistId, state);
      }
      markSynced();
      setSyncStatus({ state: 'success', message: `Pushed ${new Date().toLocaleTimeString()}` });
    } catch (e) {
      setSyncStatus({ state: 'error', message: e.message || String(e) });
    }
  };

  const cloudPull = async (sha, opts = {}) => {
    if (!gistToken || !gistId) { setSyncStatus({ state: 'error', message: 'PAT and Gist ID required' }); return; }
    if (!opts.silent && activeTabDirty && !sha && !window.confirm('Pull will overwrite your unsaved local edits. Continue?')) return;
    setSyncStatus({ state: 'busy', message: 'Pulling…' });
    try {
      const { state, history } = await fetchStateGist(gistToken, gistId, sha);
      applyImportedState(state);
      setSyncHistory(history || []);
      markSynced();
      setSyncStatus({ state: 'success', message: sha ? `Loaded ${sha.slice(0, 7)}` : `Pulled ${new Date().toLocaleTimeString()}` });
    } catch (e) {
      setSyncStatus({ state: 'error', message: e.message || String(e) });
    }
  };

  const cloudLoadHistory = async () => {
    if (!gistToken || !gistId) return;
    setSyncStatus({ state: 'busy', message: 'Loading history…' });
    try {
      const data = await gistApi(`/gists/${gistId}`, {}, gistToken);
      setSyncHistory(data.history || []);
      setSyncStatus({ state: 'idle', message: '' });
    } catch (e) {
      setSyncStatus({ state: 'error', message: e.message || String(e) });
    }
  };

  // Save-to-File: snapshot all tabs (with current portfolio merged), bundle settings,
  // and download a fresh copy of this HTML with the state baked into the marker script.
  // Sharing that file to another machine: opening it auto-hydrates that browser's state.
  const saveToFile = async () => {
    const now = Date.now();
    const snappedTabs = tabs.map(t => t.id === activeTabId ? { ...t, portfolio, savedAt: now } : t);
    const nextHistory = computeNextHistory(valueHistory);
    const state = {
      v: 1, savedAt: now,
      tabs: snappedTabs, activeTabId, taxSettings, theme,
      ui: buildUiState(), valueHistory: nextHistory,
    };
    setTabs(snappedTabs);
    persistTabs(snappedTabs, activeTabId);
    setValueHistory(nextHistory);
    const ok = exportFileWithState(state);
    try { localStorage.setItem(EMBED_LAST_HASH_KEY, quickHash(JSON.stringify(state))); } catch {}
    if (gistToken && gistId) {
      setSaveToast(ok ? 'File downloaded · syncing…' : 'Export failed');
      try {
        await updateStateGist(gistToken, gistId, state);
        markSynced();
        setSaveToast(ok ? 'File downloaded · synced ☁' : 'Export failed');
      } catch {
        setSaveToast(ok ? 'File downloaded · sync failed' : 'Export failed');
      }
      setTimeout(() => setSaveToast(''), 2400);
    } else {
      setSaveToast(ok ? 'File downloaded' : 'Export failed');
      setTimeout(() => setSaveToast(''), 2200);
    }
  };

  const resetTransientState = () => {
    setRebalanceTargets(null);
    setMarketShock(0);
    setIndividualShocks({});
    setShockMode('market');
    setSimRunning(false);
    setSimFrame(0);
    setSearchOpen(false);
    setSearchQuery('');
  };

  const switchToTab = (id) => {
    if (id === activeTabId) return;
    // Snapshot current edits into the outgoing tab (in-memory only — Save persists)
    const snapshotted = tabs.map(t => t.id === activeTabId ? { ...t, portfolio } : t);
    const next = snapshotted.find(t => t.id === id);
    if (!next) return;
    setTabs(snapshotted);
    setActiveTabId(id);

    if (simFrame === 0) return {};
    const { horizon, frames } = INTERVALS[simInterval];
    const dt = horizon / frames;
    const out = {};
    portfolio.forEach(p => {
      let cumLog = 0;
      for (let i = 1; i <= simFrame; i++) {
        const spyPrev = spyPaths.avg[i - 1].price;
        const spyCurr = spyPaths.avg[i].price;
        const spyLogR = Math.log(spyCurr / spyPrev);
        const tr = tickerReturnFromSpy(p.ticker, spyLogR, dt, simSeed + i * 0.13);
        cumLog += Math.log(tr);
      }
      out[p.ticker] = Math.exp(cumLog);
    });

  // Per-ticker DCA accrual during sim: shares added since sim start.
  // Distributed across frames at each ticker's cadence.
  // simDcaShares[ticker] = extra shares accumulated through current frame.
  // simDcaCost[ticker] = extra cost basis accumulated.
  const simAccrual = useMemo(() => {
    if (simFrame === 0) return {};
    const { horizon, frames } = INTERVALS[simInterval];
    const dt = horizon / frames;
    const out = {};
    // Precompute cumulative log multipliers per ticker once — O(frames) instead of O(frames²)
    portfolio.forEach(p => {
      const purchasesPerYear = FREQ_PER_YEAR[p.dcaFreq] || 52;
      const totalPurchases = Math.floor(purchasesPerYear * horizon);
      if (totalPurchases <= 0 || p.dca <= 0) {
        out[p.ticker] = { extraShares: 0, extraCost: 0, purchaseCount: 0 };
        return;
      }
      // Build cumulative-log lookup table only up to the current frame
      const upto = Math.min(frames, simFrame);
      const cumLogAt = new Float64Array(upto + 1);
      for (let i = 1; i <= upto; i++) {
        const spyLogR = Math.log(spyPaths.avg[i].price / spyPaths.avg[i - 1].price);
        const tr = tickerReturnFromSpy(p.ticker, spyLogR, dt, simSeed + i * 0.13);
        cumLogAt[i] = cumLogAt[i - 1] + Math.log(tr);
      }
      const basePrice = getBasePriceRaw(p.ticker);
      const framesPerPurchase = frames / totalPurchases;
      let extraShares = 0, extraCost = 0, purchaseCount = 0;
      for (let n = 1; n <= totalPurchases; n++) {
        const purchaseFrame = Math.round(n * framesPerPurchase);
        if (purchaseFrame > simFrame) break;
        purchaseCount++;
        const multAtPurchase = Math.exp(cumLogAt[purchaseFrame] || 0);
        const priceAtPurchase = basePrice * multAtPurchase;
        extraShares += p.dca / priceAtPurchase;
        extraCost += p.dca;
      }
      out[p.ticker] = { extraShares, extraCost, purchaseCount };
    });
    return out;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [simFrame, simInterval, simSeed, portfolio, spyPaths, livePrices]);

  // Effective CAGR-aware per-ticker return — replaces module-level tickerReturnAt at the call site.
  // Falls back to synthetic TICKER_DB.ttm if no cache yet.
  // For 'horizon' mode, `years` weights TTM heavily near-term, CAPM at long horizons.
  const tickerReturnEff = useCallback((ticker, mode, years = 0) => {
    const d = TICKER_DB[ticker];
    if (!d) return 0;
    const h = historyCache[ticker];
    const ttm = (h && h.cagr1y != null) ? h.cagr1y : (d.ttm || 0);
    const exp = d.exp || 0;
    if (mode === 'ttm')     return ttm;
    if (mode === 'blend')   return (exp + ttm) / 2;

      // ≤1yr → cagr1y. 1–3 → blend 1y/3y. 3–5 → blend 3y/5y. 5–10 → blend 5y/10y.
      // 10–15 → blend 10y/15y. 15–20 → blend 15y/20y. >20 → longest available.
      // Missing windows fall back to the next-shortest. Always falls back to TTM if no history at all.
      const historicalAnchor = (() => {
        if (!h) return ttm;
        const c1  = h.cagr1y;
        const c3  = h.cagr3y  ?? c1;
        const c5  = h.cagr5y  ?? c3 ?? c1;
        const c10 = h.cagr10y ?? c5;
        const c15 = h.cagr15y ?? c10;
        const c20 = h.cagr20y ?? c15;
        if (years <= 1)  return c1 ?? ttm;
        if (years <= 3)  return (c1 != null && c3 != null) ? (1 - (years-1)/2) * c1 + ((years-1)/2) * c3 : (c1 ?? c3 ?? ttm);
        if (years <= 5)  return (c3 != null && c5 != null) ? (1 - (years-3)/2) * c3 + ((years-3)/2) * c5 : (c3 ?? c5 ?? ttm);
        if (years <= 10) return (c5 != null && c10 != null) ? (1 - (years-5)/5) * c5 + ((years-5)/5) * c10 : (c5 ?? c10 ?? ttm);
        if (years <= 15) return (c10 != null && c15 != null) ? (1 - (years-10)/5) * c10 + ((years-10)/5) * c15 : (c10 ?? c15 ?? ttm);
        if (years <= 20) return (c15 != null && c20 != null) ? (1 - (years-15)/5) * c15 + ((years-15)/5) * c20 : (c15 ?? c20 ?? ttm);
        return c20 ?? c15 ?? c10 ?? c5 ?? c3 ?? c1 ?? ttm;
      })();
      // CAPM mean-reversion taper — same as before.
      const w = Math.exp(-Math.max(0, years) / 5);
      return w * historicalAnchor + (1 - w) * exp;
    }

  // Risk model — per-ticker monthly log returns, Σ (annualized), correlation, Cholesky.
  // Stopgap until real history: derived from the synthetic wealth series.
  const riskModel = useMemo(() => {
    if (!portfolio.length) return null;

    const returnsByTicker = Object.fromEntries(tickers.map(t => [t, logReturns(seriesByTicker[t])]));
    const returnsList = tickers.map(t => returnsByTicker[t]);
    // Monthly covariance → annualize ×12
    const Cmonthly = covMatrix(returnsList);
    const C = Cmonthly.map(row => row.map(v => v * 12));
    const R = corrFromCov(C);

  // Portfolio analytics — vol from wᵀΣw, plus Sharpe/Sortino/VaR/CVaR from historical portfolio returns

    }
    const weights = portfolio.map(p => ({
      ticker: p.ticker,

      ...TICKER_DB[p.ticker],
    }));
    const beta = weights.reduce((s, w) => s + w.weight * w.beta, 0);
    const expReturn = RF + beta * ERP;
    const ttm = weights.reduce((s, w) => s + w.weight * w.ttm, 0);
    let vol = 0, sharpe = 0, sortino = 0, var95 = 0, cvar95 = 0;
    let portReturns = [];
    if (riskModel) {
      const w = weights.map(x => x.weight);
      vol = Math.sqrt(portfolioVariance(w, riskModel.C)) * 100; // annualized %
      // Build portfolio monthly return series via weighted sum of constituent returns
      const len = riskModel.returnsList[0]?.length || 0;
      portReturns = [];
      for (let i = 0; i < len; i++) {
        let r = 0;
        for (let k = 0; k < w.length; k++) r += w[k] * riskModel.returnsList[k][i];
        portReturns.push(r);
      }
      const annMean = mean(portReturns) * 12 * 100;
      const annStd = stdev(portReturns) * Math.sqrt(12) * 100;
      sharpe = annStd > 0 ? (annMean - RF) / annStd : 0;
      const downside = portReturns.filter(r => r < 0);
      const downStd = stdev(downside) * Math.sqrt(12) * 100;
      sortino = downStd > 0 ? (annMean - RF) / downStd : 0;
      // 1-month VaR/CVaR at 95% → applied to total value
      var95 = empiricalVaR(portReturns, 0.95) * 100;
      cvar95 = empiricalCVaR(portReturns, 0.95) * 100;

    }

  }, [portfolio, totalValue, simMultipliers, rebalanceTargets, simAccrual, riskModel]);

  const monteCarloData = useMemo(() => {
    if (totalValue === 0 || !riskModel) return [];
    const days = 60, paths = 100;
    const dt = 1 / 252;
    const n = riskModel.tickers.length;
    // Daily covariance ≈ monthly / 21
    const Cdaily = riskModel.monthlyCov.map(row => row.map(v => v / 21));
    const Ldaily = cholesky(Cdaily);
    // Per-ticker daily drift from CAPM expected return
    const driftDaily = riskModel.tickers.map(t => (TICKER_DB[t].exp / 100) / 252);
    // Initial dollar allocation per ticker (uses rebalance targets if set)

      return pos ? getCurrentValue(pos) : 0;
    });

    for (let p = 0; p < paths; p++) {

        const z = new Array(n);
        for (let k = 0; k < n; k++) z[k] = boxMuller(p * 9973 + d * 113 + k * 31 + portfolio.length);
        const correlated = multLowerTri(Ldaily, z);
        let pv = 0;
        for (let k = 0; k < n; k++) {
          const variance = Cdaily[k][k];
          const ret = driftDaily[k] - 0.5 * variance + correlated[k];
          prices[k] = prices[k] * Math.exp(ret);
          pv += initialAlloc[k] * prices[k];

    for (let d = 0; d <= days; d++) {
      const vals = portfolioPaths.map(pp => pp[d]).sort((a, b) => a - b);

      row.p50 = +vals[Math.floor(paths * 0.5)].toFixed(2);
      row.p95 = +vals[Math.floor(paths * 0.95)].toFixed(2);

    const cleaned = String(s).replace(/[\$,\s%"]/g, '').replace(/[()]/g, '-');
    if (!cleaned || cleaned === '-') return NaN;
    const n = parseFloat(cleaned);
    return Number.isFinite(n) ? n : NaN;
  };

  const importCsvFile = async (file) => {
    if (!file) return;
    try {
      const text = await file.text();
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { setCsvReport({ error: 'CSV is empty or missing header row.' }); return; }
      // Find the header row (some brokers prepend metadata)
      let headerIdx = 0;
      for (let i = 0; i < Math.min(lines.length, 10); i++) {
        const cells = parseCsvRow(lines[i]).map(c => c.toLowerCase());
        if (cells.some(c => /symbol|ticker/.test(c)) && cells.some(c => /quantity|shares|qty/.test(c))) {
          headerIdx = i; break;
        }
      }
      const headers = parseCsvRow(lines[headerIdx]);
      const iSym = findColumn(headers, 'Symbol', 'Ticker');
      const iQty = findColumn(headers, 'Quantity', 'Shares', 'Qty');
      const iCost = findColumn(headers, 'Avg Cost', 'Average Cost', 'Cost Per Share', 'Cost Basis Per Share', 'Avg Price', 'Average Price', 'Cost Basis');
      if (iSym < 0 || iQty < 0) {
        setCsvReport({ error: 'Could not find Symbol or Quantity column. Need at minimum: Symbol, Quantity. Optional: Avg Cost or Cost Basis.' });
        return;
      }
      const added = []; const skipped = []; const updated = [];
      for (let i = headerIdx + 1; i < lines.length; i++) {
        const cells = parseCsvRow(lines[i]);
        if (!cells[iSym]) continue;
        const sym = (cells[iSym] || '').replace(/[^A-Za-z]/g, '').toUpperCase();
        if (!sym) continue;
        if (!TICKER_DB[sym]) { skipped.push({ ticker: sym, reason: 'not in ticker DB' }); continue; }
        const qty = parseMoneyOrNum(cells[iQty]);
        if (!Number.isFinite(qty) || qty <= 0) { skipped.push({ ticker: sym, reason: 'invalid quantity' }); continue; }
        let costPerShare = NaN;
        if (iCost >= 0) {
          const raw = parseMoneyOrNum(cells[iCost]);
          if (Number.isFinite(raw) && raw > 0) {
            // Heuristic: if the value is much larger than the current price × 10, it's likely TOTAL cost basis,
            // not per-share. Convert.
            const refPrice = TICKER_DB[sym].price;
            costPerShare = (qty > 0 && raw > refPrice * qty * 0.5 && raw < refPrice * qty * 2)
              ? raw / qty
              : raw;
          }
        }
        if (!Number.isFinite(costPerShare) || costPerShare <= 0) {
          costPerShare = TICKER_DB[sym].price;
        }
        const existing = portfolio.find(p => p.ticker === sym);
        if (existing) {
          updateShares(sym, qty);
          updateCostPerShare(sym, costPerShare);
          updated.push({ ticker: sym, qty, costPerShare });
        } else {
          addTicker(sym);
          // Defer per-position updates until after the add (next tick)
          setTimeout(() => {
            updateShares(sym, qty);
            updateCostPerShare(sym, costPerShare);
          }, 0);
          added.push({ ticker: sym, qty, costPerShare });
        }
      }
      setCsvReport({ added, updated, skipped, fileName: file.name });
      setSaveToast(`CSV: +${added.length} new · ${updated.length} updated · ${skipped.length} skipped`);
      setTimeout(() => setSaveToast(''), 2500);
    } catch (e) {
      setCsvReport({ error: e.message || String(e) });
    }
  };

  // DCA Projection — starts at CURRENT MARKET VALUE (matches the "Starting Value" tile)
  // and runs per-ticker with the aggregate = sum of per-ticker (sum-of-parts consistency).
  // CAPM/TTM/Blend already represent total return — dividends are NOT added on top (no double-count).
  // Dividend income is tracked separately for informational display.
  const projectionData = useMemo(() => {
    const months = projectionMonths;
    if (portfolio.length === 0) {
      const empty = [{ month: 0, value: 0, contributed: 0, gain: 0, divCumulative: 0,
        upper1: 0, lower1: 0, upper2: 0, lower2: 0 }];
      empty._meta = { yield: 0, annualReturn: 0, mode: returnMode, startTotal: 0, startCostTotal: 0 };
      return empty;
    }
    // Starting state — use the same values shown in the UI ("Starting Value" tile)
    const startVal      = Object.fromEntries(portfolio.map(p => [p.ticker, getCurrentValue(p)]));
    const startCostTotal = portfolio.reduce((s, p) => s + getCostBasisTotal(p), 0);
    const startTotal     = portfolio.reduce((s, p) => s + getCurrentValue(p), 0);

    // Per-ticker monthly TOTAL return — CAPM/TTM/CAGR are effective annual rates,
    // so the proper conversion is (1+r)^(1/12)−1, NOT r/12 (which is nominal APR).
    // `horizonYears` is passed to tickerReturnEff so the 'horizon' mode can taper TTM→CAPM.
    const annualToMonthly = (rPct) => Math.pow(1 + rPct / 100, 1 / 12) - 1;
    const horizonYears = months / 12;
    const tickerMonthly = Object.fromEntries(portfolio.map(p => [p.ticker,
      annualToMonthly(tickerReturnEff(p.ticker, returnMode, horizonYears))
    ]));
    const tickerDca = Object.fromEntries(portfolio.map(p => [p.ticker, p.dca * freqToMonthly(p.dcaFreq)]));
    // Per-ticker monthly yield, only used to surface dividend income (informational).
    // Yield is typically quoted as a nominal annual rate paid out in equal installments,
    // so /12 is the correct conversion here (matches how brokers report quarterly dividends).
    const tickerYieldM = Object.fromEntries(portfolio.map(p => [p.ticker, getYield(p.ticker) / 100 / 12]));

    // Portfolio-level metrics for vol bands and the "annualReturn" display
    const weights = portfolio.map(p => {
      const w = startTotal > 0 ? getCurrentValue(p) / startTotal : 0;
      return { ticker: p.ticker, w, ...TICKER_DB[p.ticker] };
    });
    const baseBeta = weights.reduce((s, x) => s + x.w * x.beta, 0);
    const baseExp  = RF + baseBeta * ERP;
    const baseTtm  = weights.reduce((s, x) => {
      const h = historyCache[x.ticker];
      const ttm = (h && h.cagr1y != null) ? h.cagr1y : x.ttm;
      return s + x.w * ttm;
    }, 0);
    const annualReturn = (() => {
      if (returnMode === 'ttm')   return baseTtm;
      if (returnMode === 'blend') return (baseExp + baseTtm) / 2;
      if (returnMode === 'horizon') {
        const w = Math.exp(-Math.max(0, horizonYears) / 5);
        return w * baseTtm + (1 - w) * baseExp;
      }
      return baseExp;
    })();
    const baseVol  = Math.sqrt(weights.reduce((s, x) => s + Math.pow(x.w * x.vol, 2), 0)) * 1.4;
    const baseYield = weights.reduce((s, x) => s + x.w * getYield(x.ticker), 0);
    const monthlyVol = baseVol / 100 / Math.sqrt(12);

    // Run forward
    const perTicker = { ...startVal };
    let contrib = startCostTotal;
    let cumDiv = 0;
    const data = [];
    for (let m = 0; m <= months; m++) {
      if (m > 0) {
        let divThisMonth = 0;
        portfolio.forEach(p => {
          divThisMonth += perTicker[p.ticker] * tickerYieldM[p.ticker];
          perTicker[p.ticker] = perTicker[p.ticker] * (1 + tickerMonthly[p.ticker]) + tickerDca[p.ticker];
        });
        cumDiv += divThisMonth;
        contrib += totalDCAMonthly;
      }
      // Aggregate = sum of per-ticker (so sum-of-parts always reconciles with headline)
      const v = portfolio.reduce((s, p) => s + perTicker[p.ticker], 0);
      const cumVol = monthlyVol * Math.sqrt(m);
      const row = {
        month: m,
        value: +v.toFixed(2),
        contributed: +contrib.toFixed(2),
        gain: +(v - contrib).toFixed(2),
        divCumulative: +cumDiv.toFixed(2),
        upper1: +(v * Math.exp(cumVol)).toFixed(2), lower1: +(v * Math.exp(-cumVol)).toFixed(2),
        upper2: +(v * Math.exp(2 * cumVol)).toFixed(2), lower2: +(v * Math.exp(-2 * cumVol)).toFixed(2),
      };
      portfolio.forEach(p => { row[p.ticker] = +perTicker[p.ticker].toFixed(2); });
      data.push(row);
    }
    data._meta = { yield: baseYield, annualReturn, mode: returnMode, startTotal, startCostTotal };
    return data;
  }, [portfolio, projectionMonths, totalDCAMonthly, returnMode, historyCache, totalValue, baseTotalValue, simAccrual, simMultipliers]);

  const finalProjection = projectionData[projectionData.length - 1] || { value: 0, contributed: 0, gain: 0, upper1: 0, lower1: 0 };
  const totalGain = finalProjection.value - finalProjection.contributed;
  const totalGainPct = finalProjection.contributed > 0 ? (finalProjection.value / finalProjection.contributed - 1) * 100 : 0;

  // DCA scenarios
  const dcaScenarios = useMemo(() => {
    const baseDca = totalDCAMonthly;
    const years = projectionMonths / 12;
    const annualReturn = (() => {
      if (returnMode === 'ttm')   return analytics.ttm;
      if (returnMode === 'blend') return (analytics.expReturn + analytics.ttm) / 2;
      if (returnMode === 'horizon') {
        const w = Math.exp(-Math.max(0, years) / 5);
        return w * analytics.ttm + (1 - w) * analytics.expReturn;
      }
      return analytics.expReturn;
    })();
    // Effective annual → monthly (NOT nominal /12). See note above.
    const monthlyReturn = Math.pow(1 + annualReturn / 100, 1 / 12) - 1;
    return [0, 0.5, 1, 1.5, 2, 3].map(mult => {
      const dca = baseDca * mult;
      // Start value = current market value; contributed = original cost basis + accumulated DCA.
      // (Previously initialized contributed = totalValue, which mixed unrealized gain into contributions.)
      let v = totalValue;
      let c = baseTotalValue;
      for (let m = 1; m <= projectionMonths; m++) { v = v * (1 + monthlyReturn) + dca; c += dca; }
      return {
        multiplier: mult, label: mult === 0 ? 'No DCA' : `${mult}x`,
        monthlyDca: dca, finalValue: +v.toFixed(2), contributed: +c.toFixed(2), gain: +(v - c).toFixed(2),
      };
    });
  }, [portfolio, projectionMonths, totalDCAMonthly, totalValue, baseTotalValue, returnMode, analytics]);

  // Pie data
  const pieData = analytics.weights.map(w => ({
    name: w.ticker, value: w.weight * 100, color: CATEGORY_COLORS[w.category] || '#71717a',
  }));

  // Search results
  const searchResults = useMemo(() => {
    const q = searchQuery.toUpperCase().trim();
    const inPort = new Set(portfolio.map(p => p.ticker));
    return Object.entries(TICKER_DB)
      .filter(([t, d]) => {
        if (inPort.has(t)) return false;
        if (filterCategory !== 'All' && d.category !== filterCategory) return false;
        if (!q) return true;
        return t.includes(q) || d.name.toUpperCase().includes(q);
      }).slice(0, 12);
  }, [searchQuery, filterCategory, portfolio]);

  const categories = ['All', ...new Set(Object.values(TICKER_DB).map(t => t.category))];
  const quickAdds = ['QQQ', 'SCHD', 'IWM', 'AVGO', 'NVDA', 'GLD', 'XLE', 'TLT'].filter(t => !portfolio.find(p => p.ticker === t));
  // ============================================================
  // RENDER HELPERS for panels
  // ============================================================
  const panelTitles = {

    frontier: 'Efficient Frontier',

  const renderPanelHeader = (panelKey, accent) => {
