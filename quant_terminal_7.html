      }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        {!isMobile && (
          <span style={{ color: 'var(--text-4)', fontSize: 14, userSelect: 'none' }} title="Drag to reorder">⋮⋮</span>
        )}
        <div>
          <div className="label-cap" style={{ color: accent, marginBottom: 2 }}>{panelTitles[panelKey]}</div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 4 }}>
        <button onClick={() => togglePanelCollapse(panelKey)}
          title={isCollapsed ? 'Expand' : 'Collapse'}
          style={{
            background: isCollapsed ? accent : 'transparent', border: `1px solid ${isCollapsed ? accent : 'var(--border-2)'}`,
            color: isCollapsed ? '#000' : 'var(--text-3)', width: 26, height: 26, borderRadius: 7,
            fontSize: 11, cursor: 'pointer', fontWeight: 700,
          }}>{isCollapsed ? '+' : '–'}</button>
        <button onClick={() => movePanel(panelKey, 'up')}
          disabled={panelOrder.indexOf(panelKey) === 0}
          title="Move up"
          style={{
            background: 'transparent', border: '1px solid var(--border-2)',
            color: 'var(--text-3)', width: 26, height: 26, borderRadius: 7,
            fontSize: 12, cursor: 'pointer',
            opacity: panelOrder.indexOf(panelKey) === 0 ? 0.3 : 1,
          }}>↑</button>
        <button onClick={() => movePanel(panelKey, 'down')}
          disabled={panelOrder.indexOf(panelKey) === panelOrder.length - 1}
          title="Move down"
          style={{
            background: 'transparent', border: '1px solid var(--border-2)',
            color: 'var(--text-3)', width: 26, height: 26, borderRadius: 7,
            fontSize: 12, cursor: 'pointer',
            opacity: panelOrder.indexOf(panelKey) === panelOrder.length - 1 ? 0.3 : 1,
          }}>↓</button>
      </div>
    </div>
    );
  };

  // Compact summary content shown when a panel is collapsed.
  const renderCollapsedSummary = (panelKey) => {
    const cellStyle = { padding: '8px 10px', background: 'var(--bg-2)', borderRadius: 8, border: '1px solid var(--border-1)' };
    const labelStyle = { fontSize: 10, color: 'var(--text-3)', marginBottom: 3, fontWeight: 500 };
    const valueStyle = { fontSize: 13, color: 'var(--text-1)', fontWeight: 700, letterSpacing: '-0.01em' };
    const wrap = (items) => (
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${Math.min(items.length, isMobile ? 2 : 4)}, 1fr)`, gap: 8 }}>
        {items.map((it, i) => (
          <div key={i} className="stat-num" style={cellStyle}>
            <div style={labelStyle}>{it.label}</div>
            <div style={{ ...valueStyle, color: it.color || valueStyle.color }}>{it.value}</div>
            {it.sub && <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>{it.sub}</div>}
          </div>
        ))}
      </div>
    );
    if (panelKey === 'sml') {
      return wrap([
        { label: 'Portfolio β', value: fmt(analytics.beta, 3), color: 'var(--accent)' },
        { label: 'E(R) CAPM', value: pct(analytics.expReturn, 1), color: 'var(--accent-green)' },
        { label: 'vs SPY', value: signed((analytics.beta - 1) * 100, 1) + '%', color: 'var(--text-2)' },
        { label: 'Tickers', value: portfolio.length },
      ]);
    }
    if (panelKey === 'allocation') {
      const top = [...pieData].sort((a,b) => b.value - a.value).slice(0, isMobile ? 2 : 4);
      return wrap(top.map(t => ({ label: t.name, value: pct(t.value, 1), color: t.color })));
    }
    if (panelKey === 'rebalancer') {
      const active = !!rebalanceTargets;
      const drift = rebalanceTargets ? portfolio.reduce((s, p) => {
        const cur = totalValue > 0 ? getCurrentValue(p) / totalValue : 0;
        const tgt = rebalanceTargets[p.ticker] || 0;
        return s + Math.abs(cur - tgt);
      }, 0) * 50 : 0;
      return wrap([
        { label: 'Status', value: active ? 'Active' : 'Off', color: active ? 'var(--accent-orange)' : 'var(--text-3)' },
        { label: 'Total Drift', value: active ? pct(drift, 1) : '—', color: 'var(--accent-orange)' },
        { label: 'Positions', value: portfolio.length },
      ]);
    }
    if (panelKey === 'shock') {
      return wrap([
        { label: 'Mode', value: shockMode === 'market' ? 'Market' : 'Per-ticker', color: 'var(--accent-orange)' },
        { label: 'Shock', value: shockMode === 'market' ? signed(marketShock, 1) + '%' : '—' },
        { label: 'New Value', value: usdShort(newTotal), color: 'var(--text-1)' },
        { label: 'P/L', value: signed(totalPnLPct, 2) + '%', color: totalPnL >= 0 ? 'var(--accent-green)' : 'var(--accent-red)', sub: signed(totalPnL, 0) },
      ]);
    }
    if (panelKey === 'montecarlo') {
      const last = monteCarloData[monteCarloData.length - 1] || { p5: 0, p50: 0, p95: 0 };
      return wrap([
        { label: 'P5 (Bear)', value: usdShort(last.p5), color: 'var(--accent-red)' },
        { label: 'P50 (Med)', value: usdShort(last.p50), color: 'var(--accent-pink)' },
        { label: 'P95 (Bull)', value: usdShort(last.p95), color: 'var(--accent-green)' },
        { label: '60d band', value: signed((last.p95/last.p5 - 1) * 100, 0) + '%' },
      ]);
    }
    if (panelKey === 'performance') {
      const last = wealthData[wealthData.length - 1] || { Portfolio: 100, SPY: 100 };
      const portRet = last.Portfolio - 100;
      const spyRet = last.SPY - 100;
      const portDD = maxDD(wealthData.map(d => d.Portfolio));
      return wrap([
        { label: '12mo Port', value: signed(portRet, 1) + '%', color: portRet >= 0 ? 'var(--accent-green)' : 'var(--accent-red)' },
        { label: '12mo SPY', value: signed(spyRet, 1) + '%', color: 'var(--text-2)' },
        { label: 'vs SPY', value: signed(portRet - spyRet, 1) + '%', color: portRet >= spyRet ? 'var(--accent-green)' : 'var(--accent-red)' },
        { label: 'Max DD', value: pct(portDD, 1), color: 'var(--accent-red)' },
      ]);
    }
    return null;
  };

  // ============================================================
  // PANEL RENDERERS
  // ============================================================
  const renderSmlPanel = () => (
    <div key="sml" className="card" style={{ padding: collapsedPanels.has('sml') ? 16 : 20, marginBottom: 14 }}>
      {renderPanelHeader('sml', 'var(--accent)')}
      {collapsedPanels.has('sml') ? renderCollapsedSummary('sml') : (<>
      <div style={{ fontSize: 17, color: 'var(--text-1)', fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 12 }}>
        CAPM — Expected Return vs Beta
      </div>
      <ResponsiveContainer width="100%" height={isMobile ? 220 : 280}>
        <ScatterChart margin={{ top: 8, right: 20, bottom: 28, left: 8 }}>
          <CartesianGrid stroke="var(--border-1)" strokeDasharray="2 4" />
          <XAxis type="number" dataKey="beta" domain={[-0.5, 2.5]} tick={{ fill: 'var(--text-3)', fontSize: 11 }} stroke="var(--border-2)" label={{ value: 'Beta (β)', position: 'bottom', offset: 12, fill: 'var(--text-3)', fontSize: 11 }} />
          <YAxis type="number" dataKey="expectedReturn" domain={[-10, 35]} tick={{ fill: 'var(--text-3)', fontSize: 11 }} stroke="var(--border-2)" />
          <Tooltip content={({ active, payload }) => {
            if (!active || !payload?.length) return null;
            const d = payload[0].payload;
            return (
              <div style={{ background: 'var(--bg-2)', border: '1px solid var(--border-2)', padding: 10, borderRadius: 10, fontSize: 12 }}>
                <div style={{ color: d.color, fontWeight: 700 }}>{d.ticker}</div>
                <div className="stat-num" style={{ color: 'var(--text-1)' }}>β {fmt(d.beta)} · E(R) {pct(d.expectedReturn)}</div>
              </div>
            );
          }} />
          <Line data={capmData.sml} type="linear" dataKey="sml" stroke="var(--text-4)" strokeWidth={1.5} strokeDasharray="6 4" dot={false} xAxisId={0} />
          <ReferenceLine x={1} stroke="var(--border-2)" strokeDasharray="2 4" />
          <ReferenceLine y={RF} stroke="var(--border-2)" strokeDasharray="2 4" />
          <Scatter data={capmData.scatter}>
            {capmData.scatter.map((e, i) => (
              <Cell key={i} fill={e.color} stroke={e.isPortfolio ? '#fff' : e.color} strokeWidth={e.isPortfolio ? 2 : 0} />
            ))}
          </Scatter>
        </ScatterChart>
      </ResponsiveContainer>
      </>)}
    </div>
  );

  const renderAllocationPanel = () => (
    <div key="allocation" className="card" style={{ padding: collapsedPanels.has('allocation') ? 16 : 20, marginBottom: 14 }}>
      {renderPanelHeader('allocation', 'var(--accent-purple)')}
      {collapsedPanels.has('allocation') ? renderCollapsedSummary('allocation') : (<>
      <div style={{ fontSize: 17, color: 'var(--text-1)', fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 12 }}>
        Current Mix
      </div>
      {pieData.length > 0 ? (
        <>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={56} outerRadius={94} paddingAngle={2}>
                {pieData.map((d, i) => <Cell key={i} fill={d.color} stroke="var(--bg-0)" strokeWidth={2} />)}
              </Pie>
              <Tooltip content={({ active, payload }) => {
                if (!active || !payload?.length) return null;
                const d = payload[0].payload;
                return (
                  <div style={{ background: 'var(--bg-2)', border: '1px solid var(--border-2)', padding: 10, borderRadius: 10, fontSize: 12 }}>
                    <span style={{ color: d.color, fontWeight: 700 }}>{d.name}</span> <span className="stat-num" style={{ color: 'var(--text-1)' }}>{pct(d.value, 1)}</span>
                  </div>
                );
              }} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 6, marginTop: 10 }}>
            {pieData.map(d => (
              <div key={d.name} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '4px 0' }}>
                <span style={{ color: d.color, fontWeight: 600 }}>{d.name}</span>
                <span className="stat-num" style={{ color: 'var(--text-2)' }}>{pct(d.value, 1)}</span>
              </div>
            ))}
          </div>
        </>
      ) : <div style={{ padding: 30, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>Add positions</div>}
      </>)}
    </div>
  );

  const renderRebalancerPanel = () => {
    const tickers = portfolio.map(p => p.ticker);
    const currentWeights = Object.fromEntries(portfolio.map(p => [p.ticker, totalValue > 0 ? getCurrentValue(p) / totalValue : 0]));
    const isActive = rebalanceTargets != null;
    if (collapsedPanels.has('rebalancer')) {
      return (
        <div key="rebalancer" className="card" style={{ padding: 16, marginBottom: 14 }}>
          {renderPanelHeader('rebalancer', 'var(--accent-yellow)')}
          {renderCollapsedSummary('rebalancer')}
        </div>
      );
    }
    return (
      <div key="rebalancer" className="card" style={{ padding: 20, marginBottom: 14 }}>
        {renderPanelHeader('rebalancer', 'var(--accent-yellow)')}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14, flexWrap: 'wrap', gap: 8 }}>
          <div style={{ fontSize: 17, color: 'var(--text-1)', fontWeight: 600, letterSpacing: '-0.02em' }}>
            What-if Allocation
          </div>
          {isActive && (
            <button onClick={resetRebalancer} className="btn-ghost" style={{ color: 'var(--accent-red)', fontSize: 12, padding: '5px 12px' }}>
              ↺ Clear

  const rollingVolData = useMemo(() => {
    if (!riskModel || !analytics.portReturns.length) return [];
    const r = analytics.portReturns;
    const window = 3; // 3-month rolling on monthly series (12mo total)
    const out = [];
    const months = MONTHS.slice(1);
    for (let i = 0; i < r.length; i++) {
      if (i < window - 1) { out.push({ month: months[i], vol: null, spyVol: null }); continue; }
      const slice = r.slice(i - window + 1, i + 1);
      const annVol = stdev(slice) * Math.sqrt(12) * 100;
      // SPY rolling vol from synthetic SPY series
      const spyRet = logReturns(SPY_SERIES);
      const spySlice = spyRet.slice(i - window + 1, i + 1);
      const spyAnnVol = stdev(spySlice) * Math.sqrt(12) * 100;
      out.push({ month: months[i], vol: +annVol.toFixed(2), spyVol: +spyAnnVol.toFixed(2) });
    }
    return out;
  }, [riskModel, analytics.portReturns]);

  const renderCorrelationPanel = () => {
    const isCollapsed = collapsedPanels.has('correlation');
    if (!riskModel || riskModel.tickers.length < 2) {
      return (
        <div key="correlation" className="card" style={{ padding: isCollapsed ? 16 : 20, marginBottom: 14 }}>
          {renderPanelHeader('correlation', 'var(--accent-yellow)')}
          {!isCollapsed && <div style={{ padding: 20, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>Need 2+ positions for correlation</div>}
        </div>
      );
    }
    const tickers = riskModel.tickers;
    const R = riskModel.R;
    // Avg pairwise correlation (off-diagonal)
    let sum = 0, count = 0;
    for (let i = 0; i < tickers.length; i++) {
      for (let j = 0; j < i; j++) { sum += R[i][j]; count++; }
    }
    const avgCorr = count > 0 ? sum / count : 0;
    // Find min/max off-diagonal pairs
    let minPair = { v: 1, a: '', b: '' }, maxPair = { v: -1, a: '', b: '' };
    for (let i = 0; i < tickers.length; i++) {
      for (let j = 0; j < i; j++) {
        if (R[i][j] < minPair.v) minPair = { v: R[i][j], a: tickers[i], b: tickers[j] };
        if (R[i][j] > maxPair.v) maxPair = { v: R[i][j], a: tickers[i], b: tickers[j] };
      }
    }
    if (isCollapsed) {
      return (
        <div key="correlation" className="card" style={{ padding: 16, marginBottom: 14 }}>
          {renderPanelHeader('correlation', 'var(--accent-yellow)')}
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${isMobile ? 2 : 3}, 1fr)`, gap: 8 }}>
            <div className="stat-num" style={{ padding: '8px 10px', background: 'var(--bg-2)', borderRadius: 8, border: '1px solid var(--border-1)' }}>
              <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Avg ρ</div>
              <div style={{ fontSize: 13, color: 'var(--accent-yellow)', fontWeight: 700 }}>{fmt(avgCorr, 2)}</div>
            </div>
            <div className="stat-num" style={{ padding: '8px 10px', background: 'var(--bg-2)', borderRadius: 8, border: '1px solid var(--border-1)' }}>
              <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Most correlated</div>
              <div style={{ fontSize: 12, color: 'var(--accent-red)', fontWeight: 700 }}>{maxPair.a}·{maxPair.b} {fmt(maxPair.v, 2)}</div>
            </div>
            <div className="stat-num" style={{ padding: '8px 10px', background: 'var(--bg-2)', borderRadius: 8, border: '1px solid var(--border-1)' }}>
              <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Best diversifier</div>
              <div style={{ fontSize: 12, color: 'var(--accent-green)', fontWeight: 700 }}>{minPair.a}·{minPair.b} {fmt(minPair.v, 2)}</div>
            </div>
          </div>
        </div>
      );
    }
    // Color for correlation: -1 green → 0 neutral → +1 red
    const corrColor = (v) => {
      const clamped = Math.max(-1, Math.min(1, v));
      if (clamped >= 0) {
        const a = clamped; // 0..1
        return `rgba(255, 69, 58, ${0.08 + a * 0.7})`;
      } else {
        const a = -clamped;
        return `rgba(48, 209, 88, ${0.08 + a * 0.7})`;
      }
    };
    const cellSize = Math.max(38, Math.min(64, isMobile ? 42 : 56));
    return (
      <div key="correlation" className="card" style={{ padding: 20, marginBottom: 14 }}>
        {renderPanelHeader('correlation', 'var(--accent-yellow)')}
        <div style={{ fontSize: 17, color: 'var(--text-1)', fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 4 }}>
          Pairwise ρ (12mo)
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-3)', marginBottom: 12 }}>
          Avg pairwise correlation <span className="stat-num" style={{ color: 'var(--accent-yellow)', fontWeight: 700 }}>{fmt(avgCorr, 2)}</span>
          {' · '}lower = better diversification
        </div>
        <div style={{ overflowX: 'auto' }}>
          <div style={{ display: 'inline-grid', gridTemplateColumns: `auto repeat(${tickers.length}, ${cellSize}px)`, gap: 2 }}>
            <div></div>
            {tickers.map(t => (
              <div key={t} style={{ fontSize: 10, color: 'var(--text-2)', fontWeight: 600, textAlign: 'center', padding: '4px 0', letterSpacing: '-0.01em' }}>{t}</div>
            ))}
            {tickers.map((rowT, i) => (
              <React.Fragment key={rowT}>
                <div style={{ fontSize: 10, color: 'var(--text-2)', fontWeight: 600, padding: '0 8px 0 0', alignSelf: 'center', textAlign: 'right' }}>{rowT}</div>
                {tickers.map((colT, j) => {
                  const v = R[i][j];
                  return (
                    <div key={colT} className="stat-num" style={{
                      width: cellSize, height: cellSize,
                      background: i === j ? 'var(--bg-3)' : corrColor(v),
                      border: '1px solid var(--border-1)', borderRadius: 6,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 11, fontWeight: 600,
                      color: i === j ? 'var(--text-3)' : (Math.abs(v) > 0.5 ? '#fff' : 'var(--text-1)'),
                    }} title={`${rowT} · ${colT} = ${fmt(v, 3)}`}>
                      {fmt(v, 2)}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8, marginTop: 14 }}>
          <div className="card-tight" style={{ padding: 10 }}>
            <div style={{ fontSize: 10, color: 'var(--accent-red)', fontWeight: 600 }}>Most correlated pair</div>
            <div className="stat-num" style={{ fontSize: 13, color: 'var(--text-1)', fontWeight: 700, marginTop: 2 }}>{maxPair.a} · {maxPair.b}</div>
            <div className="stat-num" style={{ fontSize: 11, color: 'var(--accent-red)' }}>ρ = {fmt(maxPair.v, 3)}</div>
          </div>
          <div className="card-tight" style={{ padding: 10 }}>
            <div style={{ fontSize: 10, color: 'var(--accent-green)', fontWeight: 600 }}>Best diversifier pair</div>
            <div className="stat-num" style={{ fontSize: 13, color: 'var(--text-1)', fontWeight: 700, marginTop: 2 }}>{minPair.a} · {minPair.b}</div>
            <div className="stat-num" style={{ fontSize: 11, color: 'var(--accent-green)' }}>ρ = {fmt(minPair.v, 3)}</div>
          </div>
        </div>
      </div>
    );
  };

  // ============================================================
  // TAX PLANNER PANEL — capital gains projections + harvesting + suggestions
  // ============================================================
  const taxAnalysis = useMemo(() => {
    const { filing, income, stateRate, holdings } = taxSettings;
    const ordRate = ordinaryRate(filing, income);
    const ltRate = ltcgRate(filing, income);
    const stateDecimal = (stateRate || 0) / 100;
    const niit = niitApplies(filing, income) ? NIIT_RATE : 0;
    const effST = ordRate + stateDecimal + niit;
    const effLT = ltRate + stateDecimal + niit;
    const positions = portfolio.map(p => {
      const cb = getCostBasisTotal(p);
      const cv = getCurrentValue(p);
      const gain = cv - cb;
      const period = holdings[p.ticker] || 'lt';
      const rate = period === 'st' ? effST : effLT;
      const stTax = gain > 0 ? gain * effST : 0;
      const ltTax = gain > 0 ? gain * effLT : 0;
      const tax = gain > 0 ? gain * rate : 0;
      return { ticker: p.ticker, cb, cv, gain, period, rate, tax, stTax, ltTax,
        color: CATEGORY_COLORS[TICKER_DB[p.ticker].category] || 'var(--text-3)' };
    });
    const totalGains = positions.filter(p => p.gain > 0).reduce((s, p) => s + p.gain, 0);
    const totalLosses = positions.filter(p => p.gain < 0).reduce((s, p) => s + (-p.gain), 0);
    const netGain = Math.max(0, totalGains - totalLosses);
    // After harvesting losses to offset gains, the remainder taxed at chosen mix
    const mixedTax = positions.filter(p => p.gain > 0).reduce((s, p) => s + p.tax, 0);
    const taxIfAllST = totalGains * effST;
    const taxIfAllLT = totalGains * effLT;
    const savingsHoldLT = Math.max(0, taxIfAllST - mixedTax);
    // Tax-loss harvesting potential: losses × LT rate (assumes offsets LT gains; otherwise saves at ord rate)
    const harvestableLosses = totalLosses;
    const harvestSavings = Math.min(totalLosses, totalGains) * effLT + Math.max(0, totalLosses - totalGains) * Math.min(effST, 0.10 * 3000 / Math.max(1, totalLosses - totalGains));
    // simpler: assume offsetting like-term gains first; $3K ord-income offset cap per year for remainder
    const offsetUsed = Math.min(totalLosses, totalGains);
    const offsetSavings = offsetUsed * effLT;
    const carryover = Math.max(0, totalLosses - totalGains);
    const ordOffsetCap = Math.min(carryover, 3000);
    const ordOffsetSavings = ordOffsetCap * ordRate;
    const harvestPotential = offsetSavings + ordOffsetSavings;
    const carryoverNext = Math.max(0, carryover - 3000);
    return {
      filing, income, stateDecimal, ordRate, ltRate, niit, effST, effLT,
      positions, totalGains, totalLosses, netGain, mixedTax, taxIfAllST, taxIfAllLT,
      savingsHoldLT, harvestableLosses, harvestPotential, offsetUsed, carryoverNext,
    };
  }, [portfolio, taxSettings, simMultipliers, simAccrual, livePrices]);

  const renderTaxPanel = () => {
    const isCollapsed = collapsedPanels.has('tax');
    const t = taxAnalysis;
    const dollarShortVsLong = t.taxIfAllST - t.taxIfAllLT;
    if (isCollapsed) {
      return (
        <div key="tax" className="card" style={{ padding: 16, marginBottom: 14 }}>
          {renderPanelHeader('tax', 'var(--accent-yellow)')}
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${isMobile ? 2 : 4}, 1fr)`, gap: 8 }}>
            {[
              { label: 'Tax if Sold', value: usdShort(t.mixedTax), color: 'var(--accent-red)' },
              { label: 'After Tax', value: usdShort(totalValue - t.mixedTax), color: 'var(--accent-green)' },
              { label: 'TLH Savings', value: usdShort(t.harvestPotential), color: 'var(--accent-cyan)' },
              { label: 'LT vs ST', value: usdShort(dollarShortVsLong), color: 'var(--accent-purple)' },
            ].map((it, i) => (
              <div key={i} className="stat-num" style={{ padding: '8px 10px', background: 'var(--bg-2)', borderRadius: 8, border: '1px solid var(--border-1)' }}>
                <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 3 }}>{it.label}</div>
                <div style={{ fontSize: 13, color: it.color, fontWeight: 700 }}>{it.value}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    // Suggestions engine
    const suggestions = [];
    if (t.harvestableLosses > 0) {
      const losers = t.positions.filter(p => p.gain < 0).sort((a, b) => a.gain - b.gain).slice(0, 3).map(p => p.ticker).join(', ');
      suggestions.push({ icon: '✂', color: 'var(--accent-cyan)', text: `Harvest losses in ${losers} — could offset gains and save up to ${usdShort(t.harvestPotential)} in taxes. Watch for wash-sale rules (30 days).` });
    }
    const stPositions = t.positions.filter(p => p.gain > 0 && p.period === 'st');
    if (stPositions.length > 0) {
      const stGain = stPositions.reduce((s, p) => s + p.gain, 0);
      const wait = stGain * (t.effST - t.effLT);
      if (wait > 100) suggestions.push({ icon: '⏳', color: 'var(--accent-orange)', text: `Holding ${stPositions.length} short-term winner${stPositions.length > 1 ? 's' : ''} past the 1-yr mark would save ~${usdShort(wait)} (ST ${pct(t.effST * 100, 1)} → LT ${pct(t.effLT * 100, 1)}).` });
    }
    if (t.netGain > 50000) {
      suggestions.push({ icon: '🏦', color: 'var(--accent-purple)', text: `Large unrealized gains — consider donating appreciated shares to charity (deduct fair value, avoid the gain entirely) or gifting to family in lower brackets.` });
    }
    if (t.niit > 0) {
      suggestions.push({ icon: '⚠', color: 'var(--accent-red)', text: `Income exceeds NIIT threshold (${usdShort(NIIT_THRESHOLD[t.filing])}) — investment income carries an extra 3.8% surtax. Tax-deferred accounts (401k/IRA) reduce MAGI.` });
    }
    suggestions.push({ icon: '🛡', color: 'var(--accent-green)', text: `Hold high-growth positions in a Roth IRA (tax-free), bonds/REITs in a traditional IRA (defer ordinary-income distributions), and put broad ETFs in taxable accounts where they're already tax-efficient.` });
    if (t.positions.some(p => p.gain > 0 && p.ticker)) {
      suggestions.push({ icon: '📅', color: 'var(--accent-cyan)', text: `Specific-lot accounting (vs FIFO) at your broker lets you pick which shares to sell — usually the highest cost basis to minimize gains.` });
    }

    return (
      <div key="tax" className="card" style={{ padding: 20, marginBottom: 14 }}>
        {renderPanelHeader('tax', 'var(--accent-yellow)')}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12, flexWrap: 'wrap', gap: 8 }}>
          <div style={{ fontSize: 17, color: 'var(--text-1)', fontWeight: 600, letterSpacing: '-0.02em' }}>If You Sold Everything Today</div>
          <div style={{ fontSize: 10, color: 'var(--text-4)' }}>2026 US federal · estimates only, not tax advice</div>
        </div>

        {/* SETTINGS */}
        <div className="card-tight" style={{ padding: 12, marginBottom: 14, display: 'grid', gridTemplateColumns: isMobile ? '1fr 1fr' : 'repeat(4, 1fr)', gap: 10 }}>
          <div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 4 }}>Filing</div>
            <select value={t.filing} onChange={e => setTax({ filing: e.target.value })}
              className="input-clean" style={{ width: '100%', padding: '6px 8px', fontSize: 12 }}>
              <option value="single">Single</option>
              <option value="mfj">Married Joint</option>
              <option value="hoh">Head of Household</option>
            </select>

          <div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 4 }}>Annual Income</div>
            <input type="number" min={0} step={5000} value={t.income}
              onChange={e => setTax({ income: Math.max(0, +e.target.value || 0) })}
              className="input-clean" style={{ width: '100%', padding: '6px 8px', fontSize: 12 }} />
          </div>
          <div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 4 }}>State Tax %</div>
            <input type="number" min={0} max={15} step={0.5} value={taxSettings.stateRate}
              onChange={e => setTax({ stateRate: Math.max(0, +e.target.value || 0) })}
              className="input-clean" style={{ width: '100%', padding: '6px 8px', fontSize: 12 }} />
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
            <div className="stat-num" style={{ fontSize: 11, color: 'var(--text-2)', lineHeight: 1.5 }}>
              <div>ST <span style={{ color: 'var(--accent-red)', fontWeight: 700 }}>{pct(t.effST * 100, 1)}</span></div>
              <div>LT <span style={{ color: 'var(--accent-green)', fontWeight: 700 }}>{pct(t.effLT * 100, 1)}</span></div>
              {t.niit > 0 && <div style={{ color: 'var(--accent-orange)', fontSize: 10 }}>incl NIIT 3.8%</div>}
            </div>
          </div>
        </div>

        {/* AGGREGATE */}
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(4, 1fr)', gap: 8, marginBottom: 14 }}>
          <div className="card-tight" style={{ padding: 10, overflow: 'visible' }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center' }}>
              Estimated Tax
              <InfoTip title="Estimated Tax · sell-everything">
                <div>Per position with a gain: <span className="mono">gain × effective rate</span>, where the rate depends on your per-position LT/ST marker.</div>
                <div style={{ marginTop: 6 }}><b>Effective ST</b> = ordinary marginal rate + state tax + NIIT (if income &gt; threshold). <b>Effective LT</b> = LTCG bracket rate + state + NIIT.</div>
                <div style={{ marginTop: 6 }}>Losses don't owe tax (they're a credit — see Loss Harvest tile).</div>
              </InfoTip>
            </div>
            <div className="stat-num" style={{ fontSize: 18, color: 'var(--accent-red)', fontWeight: 700, letterSpacing: '-0.02em', marginTop: 2 }}>{usdShort(t.mixedTax)}</div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>if sold today @ current LT/ST mix</div>
          </div>
          <div className="card-tight" style={{ padding: 10, overflow: 'visible' }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center' }}>
              After-Tax Proceeds
              <InfoTip title="After-Tax Proceeds">
                <span className="mono">Market value − Estimated tax</span>. What hits your bank account if you liquidated today.
              </InfoTip>
            </div>
            <div className="stat-num" style={{ fontSize: 18, color: 'var(--accent-green)', fontWeight: 700, letterSpacing: '-0.02em', marginTop: 2 }}>{usdShort(totalValue - t.mixedTax)}</div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>of {usdShort(totalValue)} market value</div>
          </div>
          <div className="card-tight" style={{ padding: 10, overflow: 'visible' }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center' }}>
              ST vs LT Cost
              <InfoTip title="ST vs LT Cost — what holding past 1yr saves">
                <span className="mono">total gains × (effective ST rate − effective LT rate)</span>. The extra tax you'd pay if every winner were sold short-term instead of long-term. Translates directly into "value of patience".
              </InfoTip>
            </div>
            <div className="stat-num" style={{ fontSize: 18, color: 'var(--accent-purple)', fontWeight: 700, letterSpacing: '-0.02em', marginTop: 2 }}>{usdShort(dollarShortVsLong)}</div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>extra tax if all gains were ST</div>
          </div>
          <div className="card-tight" style={{ padding: 10, overflow: 'visible' }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center' }}>
              Loss Harvest Potential
              <InfoTip title="Tax-Loss Harvesting Savings">
                <div>If you realize your current losses, they offset gains dollar-for-dollar (LT pairs with LT first, ST with ST, then crosses).</div>
                <div style={{ marginTop: 6 }}>Estimated savings = (offsettable losses × effective rate) + (excess losses up to $3K/yr × ordinary rate). Carryover applies above $3K.</div>
                <div style={{ marginTop: 6 }}>Watch wash-sale: same security within 30 days disqualifies the loss.</div>
              </InfoTip>
            </div>
            <div className="stat-num" style={{ fontSize: 18, color: 'var(--accent-cyan)', fontWeight: 700, letterSpacing: '-0.02em', marginTop: 2 }}>{usdShort(t.harvestPotential)}</div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>{usdShort(t.harvestableLosses)} losses available</div>
          </div>
        </div>

        {/* PER-POSITION TABLE */}
        <div style={{ fontSize: 13, color: 'var(--text-1)', fontWeight: 600, marginBottom: 8 }}>By Position</div>
        <div style={{ overflowX: 'auto', marginBottom: 14 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '60px 1fr 90px 90px 70px 90px', gap: 8, fontSize: 10, color: 'var(--text-4)', letterSpacing: '0.05em', textTransform: 'uppercase', padding: '0 8px 6px', borderBottom: '1px solid var(--border-1)' }}>
            <div>Ticker</div>
            <div style={{ textAlign: 'right' }}>Gain</div>
            <div style={{ textAlign: 'right' }}>Tax if ST</div>
            <div style={{ textAlign: 'right' }}>Tax if LT</div>
            <div style={{ textAlign: 'center' }}>Held</div>
            <div style={{ textAlign: 'right' }}>Est. Tax</div>
          </div>
          {t.positions.map(p => (
            <div key={p.ticker} style={{
              display: 'grid', gridTemplateColumns: '60px 1fr 90px 90px 70px 90px', gap: 8,
              alignItems: 'center', padding: '8px', fontSize: 12,
              borderBottom: '1px solid var(--border-1)',
            }}>
              <div style={{ color: p.color, fontWeight: 700 }}>{p.ticker}</div>
              <div className="stat-num" style={{ textAlign: 'right', color: p.gain >= 0 ? 'var(--accent-green)' : 'var(--accent-red)', fontWeight: 600 }}>
                {p.gain >= 0 ? '+' : '−'}{usdShort(Math.abs(p.gain))}
              </div>
              <div className="stat-num" style={{ textAlign: 'right', color: 'var(--text-3)' }}>{p.gain > 0 ? usdShort(p.stTax) : '—'}</div>
              <div className="stat-num" style={{ textAlign: 'right', color: 'var(--text-3)' }}>{p.gain > 0 ? usdShort(p.ltTax) : '—'}</div>
              <div style={{ textAlign: 'center' }}>
                <button onClick={() => setHoldingPeriod(p.ticker, p.period === 'lt' ? 'st' : 'lt')}
                  title={p.period === 'lt' ? 'Marked long-term (>1yr) — click to flip' : 'Marked short-term (<1yr) — click to flip'}
                  style={{
                    background: p.period === 'lt' ? 'rgba(48,209,88,0.15)' : 'rgba(255,69,58,0.15)',
                    color: p.period === 'lt' ? 'var(--accent-green)' : 'var(--accent-red)',
                    border: '1px solid ' + (p.period === 'lt' ? 'rgba(48,209,88,0.4)' : 'rgba(255,69,58,0.4)'),
                    borderRadius: 6, padding: '2px 8px', fontSize: 10, fontWeight: 700,
                    cursor: 'pointer', letterSpacing: '0.05em',
                  }}>{p.period.toUpperCase()}</button>
              </div>
              <div className="stat-num" style={{ textAlign: 'right', color: p.tax > 0 ? 'var(--accent-red)' : 'var(--text-3)', fontWeight: 700 }}>
                {p.gain > 0 ? usdShort(p.tax) : (p.gain < 0 ? `+${usdShort(-p.gain * t.effLT)} TLH` : '—')}
              </div>
            </div>
          ))}
        </div>

        {/* SUGGESTIONS */}
        <div style={{ fontSize: 13, color: 'var(--text-1)', fontWeight: 600, marginBottom: 8 }}>Strategies to Reduce Tax</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {suggestions.map((s, i) => (
            <div key={i} className="card-tight" style={{
              padding: '10px 12px', display: 'flex', gap: 10, alignItems: 'flex-start',
              borderLeft: `3px solid ${s.color}`,
            }}>
              <span style={{ fontSize: 14, lineHeight: 1.2 }}>{s.icon}</span>
              <span style={{ fontSize: 12, color: 'var(--text-2)', lineHeight: 1.5 }}>{s.text}</span>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 12, fontSize: 10, color: 'var(--text-4)', lineHeight: 1.5 }}>
          Uses 2026 federal LTCG/ordinary brackets. NIIT (+3.8%) applied if income exceeds threshold.
          Per-position LT/ST toggle defaults to long-term — flip any position you've held less than a year.
          Not tax advice — consult a CPA.
        </div>
      </div>
    );
  };

  // ============================================================
  // EFFICIENT FRONTIER — Monte Carlo sampling of weight vectors
  // For each random allocation w (∑wᵢ=1, wᵢ≥0), compute σ=√(wᵀΣw) and μ=Σwᵢμᵢ.
  // Scatter the cloud; highlight current portfolio, min-vol, and max-Sharpe points.
  // ============================================================
  const frontierData = useMemo(() => {
    if (!riskModel || riskModel.tickers.length < 2) return null;
    const n = riskModel.tickers.length;
    const expReturns = riskModel.tickers.map(t => TICKER_DB[t].exp || 0); // CAPM E(R) %
    const C = riskModel.C;
    // Collapsed: only sample enough to find min-vol / max-Sharpe summary.
    // Expanded: full cloud for the scatter plot.
    const N = collapsedPanels.has('frontier') ? 250 : 1000;
    const pts = [];
    for (let i = 0; i < N; i++) {
      // Sample Dirichlet-ish: take exponential of normals, normalize. This gives diverse mixes.
      const raw = new Array(n);
      let sum = 0;
      for (let k = 0; k < n; k++) {
        const u = Math.max(0.0001, seededRand(i * 7.13 + k * 0.97 + 13));
        raw[k] = -Math.log(u);
        sum += raw[k];
      }
      const w = raw.map(x => x / sum);
      const vol = Math.sqrt(portfolioVariance(w, C)) * 100;
      const ret = w.reduce((s, wi, k) => s + wi * expReturns[k], 0);
      const sharpe = vol > 0 ? (ret - RF) / vol : 0;
      pts.push({ vol: +vol.toFixed(2), ret: +ret.toFixed(2), sharpe: +sharpe.toFixed(3), w });
    }
    // Current portfolio point
    const wCurrent = riskModel.tickers.map(t => analytics.weights.find(x => x.ticker === t)?.weight || 0);
    const curVol = Math.sqrt(portfolioVariance(wCurrent, C)) * 100;
    const curRet = wCurrent.reduce((s, wi, k) => s + wi * expReturns[k], 0);
    const current = { vol: +curVol.toFixed(2), ret: +curRet.toFixed(2), sharpe: curVol > 0 ? +((curRet - RF) / curVol).toFixed(3) : 0 };
    // Min-variance from cloud (good approximation for visualization)
    let minVol = pts[0];
    pts.forEach(p => { if (p.vol < minVol.vol) minVol = p; });
    // Max-Sharpe: closed-form tangency portfolio (long-only projected).
    // ΣC here is a correlation matrix scaled by σ²; we use it as the covariance for the
    // optimization. expReturns are already in % units; we use those directly.
    let maxSharpe;
    const tangencyW = longOnlyTangency(C, expReturns, RF);
    if (tangencyW) {
      const tVol = Math.sqrt(portfolioVariance(tangencyW, C)) * 100;
      const tRet = tangencyW.reduce((s, w, k) => s + w * expReturns[k], 0);
      const tSharpe = tVol > 0 ? (tRet - RF) / tVol : 0;
      maxSharpe = { vol: +tVol.toFixed(2), ret: +tRet.toFixed(2), sharpe: +tSharpe.toFixed(3), w: tangencyW };
    } else {
      // Fall back to cloud best if matrix is singular (e.g., collinear tickers)
      maxSharpe = pts[0];
      pts.forEach(p => { if (p.sharpe > maxSharpe.sharpe) maxSharpe = p; });
    }
    // Single-asset points for reference
    const singles = riskModel.tickers.map((t, i) => ({
      ticker: t,
      vol: +(Math.sqrt(C[i][i]) * 100).toFixed(2),
      ret: +expReturns[i].toFixed(2),
      color: CATEGORY_COLORS[TICKER_DB[t].category] || 'var(--text-3)',
    }));
    return { pts, current, minVol, maxSharpe, singles };
  }, [riskModel, analytics.weights, collapsedPanels]);

          <div className="card-tight" style={{ padding: 10 }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Current</div>
            <div className="stat-num" style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-1)' }}>{usdShort(last.value)}</div>

        <div style={{ marginTop: 10, fontSize: 10, color: 'var(--text-4)', lineHeight: 1.5 }}>
          Snapshots accrue on every Save / Save-to-File / Cloud Push. They round-trip through gist sync so opening this tab on another machine shows the full history.

  };

  // ============================================================
  // FACTOR EXPOSURE — OLS regression of portfolio excess returns vs
  // MKT (SPY−Rf), SMB (IWM−SPY), HML (VTV−VUG). Three-factor Fama-French.
  // Uses synthetic monthly closes (consistent across all tickers).
  // ============================================================
  const factorReturns = useMemo(() => {
    const spy = buildWealthSeries('SPY');
    const iwm = buildWealthSeries('IWM');
    const vtv = buildWealthSeries('VTV');
    const vug = buildWealthSeries('VUG');
    const ret = (s, i) => s[i] / s[i - 1] - 1;
    const mkt = [], smb = [], hml = [], spyRet = [];
    const rfMo = RF / 100 / 12;
    for (let i = 1; i < MONTHS.length; i++) {
      const rS = ret(spy, i), rI = ret(iwm, i), rV = ret(vtv, i), rG = ret(vug, i);
      mkt.push(rS - rfMo);
      smb.push(rI - rS);
      hml.push(rV - rG);
      spyRet.push(rS);
    }
    return { mkt, smb, hml, spyRet, n: mkt.length };
  }, []);

  const factorExposure = useMemo(() => {
    if (portfolio.length === 0 || totalValue === 0 || factorReturns.n < 6) return null;
    // Portfolio excess monthly returns
    const rfMo = RF / 100 / 12;
    const y = [];
    for (let i = 1; i < MONTHS.length; i++) {
      let r = 0;
      portfolio.forEach(p => {
        const series = buildWealthSeries(p.ticker);
        const tickerRet = series[i] / series[i - 1] - 1;
        const w = getCurrentValue(p) / totalValue;
        r += w * tickerRet;
      });
      y.push(r - rfMo);
    }
    // Design matrix: [1, MKT, SMB, HML]
    const X = factorReturns.mkt.map((_, i) => [1, factorReturns.mkt[i], factorReturns.smb[i], factorReturns.hml[i]]);
    const result = olsRegression(X, y);
    if (!result) return null;
    const [alpha, bMkt, bSmb, bHml] = result.beta;
    // Annualize α (intercept is monthly; (1+α)^12 − 1 for compound annualization)
    const alphaAnnual = (Math.pow(1 + alpha, 12) - 1) * 100;
    return { alphaAnnual, alphaMonthly: alpha * 100, bMkt, bSmb, bHml, r2: result.r2, n: result.n };
  }, [portfolio, totalValue, factorReturns]);

  const renderFactorPanel = () => {
    const isCollapsed = collapsedPanels.has('factor');
    const f = factorExposure;
    if (!f) {

        </div>
      );
    }
    if (isCollapsed) {
      return (
        <div key="factor" className="card" style={{ padding: 16, marginBottom: 14 }}>
          {renderPanelHeader('factor', 'var(--accent-orange)')}
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${isMobile ? 2 : 4}, 1fr)`, gap: 8 }}>
            {[
              { label: 'α (annual)', value: signed(f.alphaAnnual, 2) + '%', color: f.alphaAnnual >= 0 ? 'var(--accent-green)' : 'var(--accent-red)' },
              { label: 'β · MKT', value: fmt(f.bMkt, 2), color: 'var(--accent)' },
              { label: 'β · SMB', value: fmt(f.bSmb, 2), color: f.bSmb >= 0 ? 'var(--accent-pink)' : 'var(--accent-cyan)' },
              { label: 'β · HML', value: fmt(f.bHml, 2), color: f.bHml >= 0 ? 'var(--accent-green)' : 'var(--accent-purple)' },
            ].map((it, i) => (
              <div key={i} className="stat-num" style={{ padding: '8px 10px', background: 'var(--bg-2)', borderRadius: 8, border: '1px solid var(--border-1)' }}>
                <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 3 }}>{it.label}</div>
                <div style={{ fontSize: 13, color: it.color, fontWeight: 700 }}>{it.value}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    // Helper for interpretation
    const sizeInterp = f.bSmb > 0.15 ? 'small-cap tilt' : f.bSmb < -0.15 ? 'large-cap tilt' : 'size-neutral';
    const styleInterp = f.bHml > 0.15 ? 'value tilt' : f.bHml < -0.15 ? 'growth tilt' : 'style-neutral';
    const alphaInterp = f.alphaAnnual > 2 ? 'positive after factor exposures' : f.alphaAnnual < -2 ? 'negative — drag vs factors' : 'roughly explained by factors';
    return (
      <div key="factor" className="card" style={{ padding: 20, marginBottom: 14 }}>
        {renderPanelHeader('factor', 'var(--accent-orange)')}
        <div style={{ fontSize: 17, color: 'var(--text-1)', fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 4 }}>
          Fama-French 3-Factor Exposure
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-3)', marginBottom: 12 }}>
          OLS regression · {f.n} monthly observations · R² {pct(f.r2 * 100, 1)}
        </div>

        {/* 4 stat tiles */}
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(4, 1fr)', gap: 8, marginBottom: 14 }}>
          <div className="card-tight" style={{ padding: 10, overflow: 'visible' }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center' }}>
              α · annualized
              <InfoTip title="Alpha (Jensen's α)">
                Regression intercept, annualized to <span className="mono">(1+α)¹²−1</span>. Excess return <i>beyond</i> what MKT/SMB/HML explain.
                <div style={{ marginTop: 6 }}>Positive α = skill (or unidentified factor exposure). Statistically meaningful α typically requires &gt;3 years of data — we only have ~1 year, so treat as directional only.</div>
              </InfoTip>
            </div>
            <div className="stat-num" style={{ fontSize: 18, color: f.alphaAnnual >= 0 ? 'var(--accent-green)' : 'var(--accent-red)', fontWeight: 700, marginTop: 2 }}>
              {signed(f.alphaAnnual, 2)}%
            </div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>{alphaInterp}</div>
          </div>

          <div className="card-tight" style={{ padding: 10, overflow: 'visible' }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center' }}>
              β · MKT
              <InfoTip title="Market Beta">
                Sensitivity to the broad market (SPY − Rf). β=1 means moves 1-for-1 with the market.
                <div style={{ marginTop: 6 }}>Differs from your top-row Beta tile (which is a weighted average of per-ticker β's). This one is derived empirically from portfolio returns.</div>
              </InfoTip>
            </div>
            <div className="stat-num" style={{ fontSize: 18, color: 'var(--accent)', fontWeight: 700, marginTop: 2 }}>{fmt(f.bMkt, 2)}</div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>vs SPY</div>
          </div>

          <div className="card-tight" style={{ padding: 10, overflow: 'visible' }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center' }}>
              β · SMB
              <InfoTip title="Size Factor (Small Minus Big)">
                Loading on the size premium. Proxy: <span className="mono">IWM − SPY</span> (small-cap minus large-cap).
                <div style={{ marginTop: 6 }}><b>Positive</b>: your portfolio behaves like small-caps. <b>Negative</b>: large-cap exposure dominates.</div>
              </InfoTip>
            </div>
            <div className="stat-num" style={{ fontSize: 18, color: f.bSmb >= 0 ? 'var(--accent-pink)' : 'var(--accent-cyan)', fontWeight: 700, marginTop: 2 }}>
              {signed(f.bSmb, 2)}
            </div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>{sizeInterp}</div>
          </div>

          <div className="card-tight" style={{ padding: 10, overflow: 'visible' }}>
            <div style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center' }}>
              β · HML
              <InfoTip title="Style Factor (High Minus Low)">
                Loading on the value premium. Proxy: <span className="mono">VTV − VUG</span> (value minus growth).
                <div style={{ marginTop: 6 }}><b>Positive</b>: value tilt (cheap, dividend-paying). <b>Negative</b>: growth tilt (high-multiple tech/AI).</div>
              </InfoTip>
            </div>
            <div className="stat-num" style={{ fontSize: 18, color: f.bHml >= 0 ? 'var(--accent-green)' : 'var(--accent-purple)', fontWeight: 700, marginTop: 2 }}>
              {signed(f.bHml, 2)}
            </div>
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>{styleInterp}</div>
          </div>
        </div>

        {/* Loadings bar chart */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 }}>
          {[
            { label: 'β · MKT (Market)', val: f.bMkt, color: 'var(--accent)', maxAbs: 2 },
            { label: 'β · SMB (Size)',   val: f.bSmb, color: f.bSmb >= 0 ? 'var(--accent-pink)' : 'var(--accent-cyan)', maxAbs: 1 },
            { label: 'β · HML (Style)',  val: f.bHml, color: f.bHml >= 0 ? 'var(--accent-green)' : 'var(--accent-purple)', maxAbs: 1 },
          ].map(b => {
            const halfPct = 50;
            const widthPct = Math.min(50, Math.abs(b.val) / b.maxAbs * 50);
            return (
              <div key={b.label}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--text-2)', marginBottom: 3 }}>
                  <span>{b.label}</span>
                  <span className="stat-num" style={{ color: b.color, fontWeight: 700 }}>{signed(b.val, 2)}</span>
                </div>
                <div style={{ height: 8, background: 'var(--bg-3)', borderRadius: 4, position: 'relative', overflow: 'hidden' }}>
                  <div style={{ position: 'absolute', left: '50%', width: 1, height: '100%', background: 'var(--border-3)' }}></div>
                  <div style={{
                    position: 'absolute',
                    [b.val >= 0 ? 'left' : 'right']: '50%',
                    width: `${widthPct}%`,
                    height: '100%',
                    background: b.color,
                    borderRadius: 4,
                  }}></div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Interpretation block */}
        <div className="card-tight" style={{ padding: 12, borderLeft: '3px solid var(--accent-orange)' }}>
          <div className="label-cap" style={{ color: 'var(--accent-orange)', marginBottom: 6 }}>Reading the Loadings</div>
          <div style={{ fontSize: 12, color: 'var(--text-2)', lineHeight: 1.6 }}>
            This portfolio reads as <b>{sizeInterp}</b> with a <b>{styleInterp}</b>.
            R² of <b>{pct(f.r2 * 100, 1)}</b> means the three factors explain that share of return variance —
            the remainder is idiosyncratic / single-stock noise.
          </div>
        </div>

        <div style={{ marginTop: 10, fontSize: 10, color: 'var(--text-4)', lineHeight: 1.5 }}>
          Proxies: MKT = SPY − Rf · SMB = IWM − SPY · HML = VTV − VUG. {f.n} monthly observations. Short windows are noisy — directional, not statistically conclusive.
        </div>
      </div>
    );
  };

  const PANEL_RENDERERS = {
    sml: renderSmlPanel,
    timeline: renderTimelinePanel,
    risk: renderRiskPanel,
    factor: renderFactorPanel,
    frontier: renderFrontierPanel,
    tax: renderTaxPanel,
    correlation: renderCorrelationPanel,
    rebalancer: renderRebalancerPanel,
    shock: renderShockPanel,
    montecarlo: renderMonteCarloPanel,
    performance: renderPerformancePanel,
  };

  // ============================================================
  // RENDER
  // ============================================================
  return (
    <div className="container" style={{ minHeight: '100vh', padding: isMobile ? '16px 14px' : '32px 28px', paddingBottom: drawerOpen ? '420px' : '72px' }}>
      {/* PORTFOLIO TABS */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6, marginBottom: 16,
        paddingBottom: 10, borderBottom: '1px solid var(--border-1)',
        flexWrap: 'wrap',
      }}>
        {tabs.map(tab => {
          const isActive = tab.id === activeTabId;
          const isDirty = isActive ? activeTabDirty : false;
          const isEditing = editingTabId === tab.id;
          return (
            <div key={tab.id}
              onClick={() => !isEditing && switchToTab(tab.id)}
              onDoubleClick={() => setEditingTabId(tab.id)}
              title={tab.savedAt ? `Saved ${new Date(tab.savedAt).toLocaleString()}` : 'Unsaved — click Save to persist'}
              style={{
                display: 'inline-flex', alignItems: 'center', gap: 8,
                padding: '7px 12px', borderRadius: 10, cursor: 'pointer',
                background: isActive ? 'var(--bg-2)' : 'transparent',
                border: '1px solid ' + (isActive ? 'var(--border-3)' : 'var(--border-1)'),
                fontSize: 13, fontWeight: isActive ? 600 : 500,
                color: isActive ? 'var(--text-1)' : 'var(--text-3)',
                letterSpacing: '-0.01em', transition: 'all 0.15s',
              }}>
              {isEditing ? (
                <input autoFocus type="text" defaultValue={tab.name}
                  onBlur={e => { renameTab(tab.id, e.target.value); setEditingTabId(null); }}
                  onKeyDown={e => {
                    if (e.key === 'Enter') { renameTab(tab.id, e.target.value); setEditingTabId(null); }
                    if (e.key === 'Escape') { setEditingTabId(null); }
                  }}
                  onClick={e => e.stopPropagation()}
                  style={{
                    background: 'transparent', border: 'none', outline: 'none',
                    color: 'var(--text-1)', fontSize: 13, fontWeight: 600,
                    fontFamily: 'inherit', letterSpacing: '-0.01em', width: 130, padding: 0,
                  }} />
              ) : (
                <>
                  <span>{tab.name}</span>
                  {isDirty && <span title="Unsaved changes" style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent-orange)' }}></span>}
                  {!isDirty && tab.savedAt && <span title="Saved" style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent-green)', opacity: 0.5 }}></span>}
                  <span style={{ fontSize: 10, color: 'var(--text-4)' }}>{tab.id === activeTabId ? portfolio.length : (tab.portfolio?.length || 0)}</span>
                </>
              )}
              {isActive && tabs.length > 1 && !isEditing && (
                <button onClick={e => {
                  e.stopPropagation();
                  if (activeTabDirty && !window.confirm(`Close "${tab.name}" without saving?`)) return;
                  deleteTab(tab.id);
                }} title="Close tab" style={{
                  background: 'transparent', border: 'none', color: 'var(--text-3)',
                  cursor: 'pointer', fontSize: 14, padding: 0, lineHeight: 1, marginLeft: 2,
                  width: 16, height: 16, borderRadius: 4,
                }}>×</button>
              )}
            </div>
          );
        })}
        <button onClick={addNewTab} title="New empty portfolio (N)" style={{
          background: 'transparent', border: '1px dashed var(--border-2)',
          color: 'var(--text-2)', cursor: 'pointer', padding: '7px 12px',
          borderRadius: 10, fontSize: 13, fontWeight: 500, letterSpacing: '-0.01em',
          display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'inherit',
        }}>+ New</button>
        <button onClick={() => duplicateTab(activeTabId)} title="Duplicate active portfolio" style={{
          background: 'transparent', border: '1px solid var(--border-1)',
          color: 'var(--text-3)', cursor: 'pointer', padding: '7px 12px',
          borderRadius: 10, fontSize: 13, fontWeight: 500, letterSpacing: '-0.01em',
          display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'inherit',
        }}>⎘ Duplicate</button>
      </div>

      {/* HEADER */}
      <div style={{ paddingBottom: 20, marginBottom: 18, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 16 }}>
        <div>
          <div style={{ fontSize: 11, color: 'var(--text-3)', marginBottom: 6, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 8 }}>
            <span>Quant Terminal · Portfolio Lab</span>
            {activeTabDirty && <span style={{ color: 'var(--accent-orange)' }}>· unsaved</span>}
          </div>
          {titleEditing ? (
            <input autoFocus type="text" defaultValue={activeTab.name}
              onBlur={e => { renameTab(activeTabId, e.target.value); setTitleEditing(false); }}
              onKeyDown={e => {
                if (e.key === 'Enter') { renameTab(activeTabId, e.target.value); setTitleEditing(false); }
                if (e.key === 'Escape') setTitleEditing(false);
              }}
              className="h1-title"
              style={{
                margin: 0, fontSize: 32, fontWeight: 700, letterSpacing: '-0.03em',
                color: 'var(--text-1)', background: 'transparent',
                border: 'none', borderBottom: '2px solid var(--accent)',
                outline: 'none', fontFamily: 'inherit', padding: '0 0 2px 0',
                minWidth: 200, maxWidth: '100%',
              }} />
          ) : (
            <h1 onClick={() => setTitleEditing(true)}
              title="Click to rename this portfolio"
              className="h1-title"
              style={{
                margin: 0, fontSize: 32, fontWeight: 700, letterSpacing: '-0.03em',
                color: 'var(--text-1)', cursor: 'text',
                display: 'inline-flex', alignItems: 'center', gap: 10,
              }}>
              {activeTab.name}
              <span style={{ fontSize: 14, color: 'var(--text-4)', fontWeight: 400, opacity: 0.5 }} title="Click title to rename">✎</span>
            </h1>
          )}
        </div>
        <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
          <div className="header-stats" style={{ textAlign: 'right', fontSize: 12, color: 'var(--text-2)', lineHeight: 1.6 }}>
            <div><span className="stat-num">{portfolio.length}</span> positions · <span className="stat-num">{usd(totalValue)}</span></div>
            <div className="stat-num" style={{ color: 'var(--text-3)' }}>β {fmt(analytics.beta, 3)} · σ {pct(analytics.vol, 1)} · E(R) {pct(analytics.expReturn, 1)}</div>
          </div>
          <button onClick={() => setShowShortcuts(s => !s)} title="Keyboard shortcuts (?)" className="btn-ghost"
            style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 14 }}>?</span>
          </button>
          <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} title={`Switch to ${theme === 'dark' ? 'light' : 'dark'} (T)`} className="btn-ghost"
            style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 14 }}>{theme === 'dark' ? '☀' : '☾'}</span> {isMobile ? '' : (theme === 'dark' ? 'Light' : 'Dark')}
          </button>
          <button onClick={saveActiveTab} title={`Save "${activeTab.name}" to this browser (⌘S)`} className="btn-ghost"
            style={{
              display: 'flex', alignItems: 'center', gap: 6,
              color: saveToast ? 'var(--accent-green)' : (activeTabDirty ? 'var(--accent-orange)' : 'var(--text-2)'),
              border: activeTabDirty ? '1px solid var(--accent-orange)' : undefined,
            }}>
            <span style={{ fontSize: 14 }}>{saveToast ? '✓' : '💾'}</span>
            {isMobile ? '' : (saveToast || (activeTabDirty ? 'Save *' : 'Saved'))}
          </button>
          <button onClick={saveToFile} title="Download a copy of this file with all your portfolios baked in — share across computers" className="btn-ghost"
            style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'var(--text-1)' }}>
            <span style={{ fontSize: 14 }}>⬇</span> {isMobile ? '' : 'Save to File'}
          </button>
          <button onClick={() => setShowSync(true)} title="Cloud sync via private GitHub gist (versioned)" className="btn-ghost"
            style={{
              display: 'flex', alignItems: 'center', gap: 6,
              color: gistToken && gistId ? 'var(--accent-cyan)' : 'var(--text-1)',
            }}>
            <span style={{ fontSize: 14 }}>☁</span>
            {isMobile ? '' : (lastSyncAt ? `Sync · ${new Date(lastSyncAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}` : 'Sync')}
          </button>
          <button onClick={copyShareLink} title="Copy shareable portfolio link (S)" className="btn-ghost"
            style={{ display: 'flex', alignItems: 'center', gap: 6, color: shareToast ? 'var(--accent-green)' : 'var(--text-1)' }}>
            <span style={{ fontSize: 14 }}>{shareToast ? '✓' : '↗'}</span> {isMobile ? '' : (shareToast || 'Share')}
          </button>
          <button onClick={resetEverything} title="Reset everything" className="btn-ghost" style={{
            color: 'var(--accent-red)', display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <span style={{ fontSize: 14 }}>↺</span> {isMobile ? '' : 'Reset All'}
          </button>
        </div>
      </div>

      {/* LIVE PRICE BAR */}
      <div className="card-tight" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, marginBottom: 16, padding: '10px 14px', flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 12, color: 'var(--text-2)', flexWrap: 'wrap' }}>
          <span className="live-dot" style={{ background: lastRefresh ? 'var(--accent-green)' : 'var(--text-3)', boxShadow: lastRefresh ? '0 0 6px var(--accent-green)' : 'none' }}></span>
          <span>{lastRefresh ? `Last fetch ${new Date(lastRefresh).toLocaleTimeString()}` : 'Prices not fetched'}</span>
          {finnhubKey && (
            <span style={{ color: 'var(--accent-green)', fontSize: 11 }}>
              · 🔑 Key saved <span className="mono">({finnhubKey.slice(0, 4)}…{finnhubKey.slice(-4)})</span>
            </span>
          )}
          {Object.keys(priceFetchErrors).length > 0 && (
            <span style={{ color: 'var(--accent-red)', fontSize: 11 }}>· {Object.keys(priceFetchErrors).length} failed</span>
          )}
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
          {showApiKey ? (
            <>
              <input type="password" placeholder="Paste Finnhub key (saved locally)" value={finnhubKey}
                onChange={e => setFinnhubKey(e.target.value.trim())}
                autoComplete="off" spellCheck={false}
                className="input-clean"
                style={{ fontSize: 12, padding: '6px 12px', width: isMobile ? 160 : 240 }} />
              {finnhubKey && (
                <button onClick={clearApiKey} title="Clear stored key" className="btn-ghost" style={{
                  color: 'var(--accent-red)', fontSize: 12, padding: '6px 12px',
                }}>Clear</button>
              )}
            </>
          ) : null}
          <button onClick={() => setShowApiKey(!showApiKey)} title="Toggle API key input" className="btn-ghost"
            style={{ color: finnhubKey ? 'var(--accent-green)' : 'var(--text-2)', fontSize: 12, padding: '6px 12px' }}>
            {showApiKey ? 'Hide' : (finnhubKey ? 'Key ✓' : 'API Key')}
          </button>
          <button onClick={refreshAllPrices} disabled={refreshingPrices || portfolio.length === 0}
            className={`btn-primary ${refreshingPrices ? 'pulse' : ''}`}
            style={{ background: 'var(--accent-green)', color: '#000', fontSize: 12, padding: '6px 14px' }}>
            {refreshingPrices ? 'Fetching…' : '↓ Refresh'}
          </button>
        </div>
      </div>

      {/* SIM BANNER */}
      {simActive && (
        <div className="card-tight" style={{
          padding: '10px 16px', marginBottom: 14, display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', flexWrap: 'wrap', gap: 8,
          background: 'rgba(255,159,10,0.06)', borderColor: 'rgba(255,159,10,0.3)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 12, color: 'var(--accent-orange)' }}>
            <span className={simRunning ? 'pulse' : ''} style={{ fontSize: 14 }}>{simRunning ? '⚡' : '⏸'}</span>
            <span style={{ fontWeight: 600 }}>Market Sim {simRunning ? 'Running' : 'Paused'}</span>
            <span style={{ color: 'var(--text-3)' }}>{INTERVALS[simInterval].label} · {simBias} · frame <span className="stat-num">{simFrame}/{INTERVALS[simInterval].frames}</span></span>
          </div>
          <button onClick={resetSim} className="btn-ghost" style={{ color: 'var(--accent-red)', fontSize: 11, padding: '4px 10px' }}>↺ Reset</button>
        </div>
      )}

      {/* TOP STATS — normal flow, scrolls away */}
      <div className="grid-6" style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 10, marginBottom: 20 }}>
        <Stat label="Portfolio Value" value={usd(totalValue)} sub={totalUnrealizedPnL !== 0 ? `${signed(totalUnrealizedPnLPct, 2)}% unreal` : 'cost basis'} accent="var(--accent)"
          info={<>Σ (shares × current price) across all positions. "Unreal P/L %" = (current value − cost basis) / cost basis × 100. Live prices come from Finnhub (if key) or Stooq.</>} />
        <Stat label="Beta" value={fmt(analytics.beta, 3)} sub={`${signed((analytics.beta - 1) * 100, 1)}% vs SPY`} accent="var(--accent-pink)"
          info={<><div>Weighted-average β: Σ wᵢ × βᵢ where wᵢ is each position's % of total value and βᵢ is its individual beta vs SPY.</div><div style={{ marginTop: 6 }}>β = 1.0 means moves 1-for-1 with the S&P 500. β &gt; 1 = more volatile than market; β &lt; 1 = less.</div></>} />
        <Stat label="Volatility" value={pct(analytics.vol, 1)} sub={`Sharpe ${fmt(analytics.sharpe, 2)} · Sortino ${fmt(analytics.sortino, 2)}`} accent="var(--accent-orange)"
          info={<><div>Annualized standard deviation of portfolio returns: <span className="mono">√(wᵀΣw)</span> where Σ is the covariance matrix derived from per-ticker historical returns.</div><div style={{ marginTop: 6 }}><b>Sharpe</b> = (E(R) − Rf) / σ — risk-adjusted return.</div><div><b>Sortino</b> = (E(R) − Rf) / σ_downside — penalizes only negative-direction volatility.</div></>} />
        <Stat label="E(R) CAPM" value={pct(analytics.expReturn, 1)} sub={`TTM ${pct(analytics.ttm, 1)}`} accent="var(--accent-green)"
          info={<><div>Expected annual return per the Capital Asset Pricing Model:</div><div className="mono" style={{ marginTop: 6, color: 'var(--text-1)' }}>E(R) = Rf + β × (Rm − Rf)</div><div style={{ marginTop: 6 }}>Rf = {RF}% (risk-free rate), Rm = {RM}% (expected market return). This is <b>forward-looking</b>, not historical.</div><div style={{ marginTop: 6 }}><b>TTM</b> = trailing 12-month total return from real history (Tiingo) or synthetic fallback.</div></>} />
        <Stat label="VaR 95% · 1mo" value={pct(analytics.var95, 1)} sub={`CVaR ${pct(analytics.cvar95, 1)} · ${usdShort(totalValue * analytics.var95 / 100)}`} accent="var(--accent-red)"
          info={<><div><b>VaR 95%</b> over 1 month: the loss that won't be exceeded in 95% of months (5% tail probability). Parametric estimate: <span className="mono">1.645 × σ × √(1/12)</span>.</div><div style={{ marginTop: 6 }}><b>CVaR</b> (Expected Shortfall): average loss <i>given</i> you're in the worst-5% scenario — fatter than VaR because it averages the entire tail.</div><div style={{ marginTop: 6 }}>The dollar value is just VaR % × your portfolio.</div></>} />

                  {/* Interval */}
                  <div className="card-tight" style={{ marginBottom: 12, padding: 10, display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
                    <span style={{ fontSize: 11, color: 'var(--text-3)', marginRight: 4 }}>Horizon</span>
                    {Object.keys(INTERVALS).map(k => (
                      <button key={k} onClick={() => { if (!simRunning) { setSimInterval(k); setSimFrame(0); } }}
                        disabled={simRunning}
                        className="btn-ghost"
                        style={{
                          background: simInterval === k ? 'var(--accent-orange)' : 'rgba(255,255,255,0.05)',
                          color: simInterval === k ? '#000' : 'var(--text-1)',
                          fontSize: 11, padding: '4px 12px',
                          opacity: simRunning ? 0.5 : 1,
                        }}>{k}</button>
                    ))}
                    <span style={{ fontSize: 10, color: 'var(--text-4)', marginLeft: 8 }}>
                      {INTERVALS[simInterval].label} · {INTERVALS[simInterval].frames} frames
                    </span>
                  </div>

                  {/* Playback */}
                  <div style={{ display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' }}>
                    {!simRunning ? (
                      <button onClick={startSim} className="btn-primary"
                        style={{ background: 'var(--accent-green)', color: '#000', fontSize: 13 }}>
                        ▶ {simFrame > 0 && simFrame < INTERVALS[simInterval].frames ? 'Resume' : 'Play'}
                      </button>
                    ) : (
                      <button onClick={pauseSim} className="btn-primary"
                        style={{ background: 'var(--accent-orange)', color: '#000', fontSize: 13 }}>
                        ⏸ Pause
                      </button>
                    )}
                    <button onClick={resetSim} className="btn-ghost"
                      style={{ color: 'var(--accent-red)', fontSize: 13 }}>↺ Reset</button>
                    <div style={{ display: 'flex', gap: 4, alignItems: 'center', marginLeft: 10 }}>
                      <span style={{ fontSize: 11, color: 'var(--text-3)' }}>Speed</span>
                      {[[300, '0.5×'], [150, '1×'], [75, '2×'], [30, '5×']].map(([ms, l]) => (
                        <button key={ms} onClick={() => setSimSpeed(ms)} className="btn-ghost" style={{
                          background: simSpeed === ms ? 'rgba(255,255,255,0.10)' : 'transparent',
                          color: simSpeed === ms ? 'var(--text-1)' : 'var(--text-3)',
                          fontSize: 10, padding: '3px 8px',
                        }}>{l}</button>
                      ))}
                    </div>
                    <div style={{ marginLeft: 'auto', fontSize: 11 }}>
                      <span className={simRunning ? 'pulse' : ''} style={{ color: simRunning ? 'var(--accent-green)' : 'var(--text-3)' }}>
                        {simRunning ? '● Playing' : (simFrame > 0 ? '⏸ Paused' : '○ Ready')}
                      </span>
                      <span className="stat-num" style={{ marginLeft: 8, color: 'var(--text-4)' }}>
                        {simFrame}/{INTERVALS[simInterval].frames}
                      </span>
                    </div>
                  </div>

                  {/* Progress */}
                  <div style={{ background: 'var(--bg-3)', height: 4, marginBottom: 14, borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{
                      background: simBias === 'bull' ? 'var(--accent-green)' : simBias === 'bear' ? 'var(--accent-red)' : 'var(--accent-purple)',
                      height: '100%',
                      width: `${(simFrame / INTERVALS[simInterval].frames) * 100}%`,
                      transition: 'width 0.1s linear',
                    }}></div>
                  </div>

                  {/* SPY paths */}
                  <ResponsiveContainer width="100%" height={isMobile ? 200 : 240}>
                    <ComposedChart data={spyPaths.avg.map((d, i) => ({
                      step: i,
                      bear: +(spyPaths.bear[i].price * 100).toFixed(2),
                      avg: +(spyPaths.avg[i].price * 100).toFixed(2),
                      bull: +(spyPaths.bull[i].price * 100).toFixed(2),
                      marker: i === simFrame ? +(spyPaths.avg[i].price * 100).toFixed(2) : null,
                    }))} margin={{ top: 5, right: 16, bottom: 5, left: 0 }}>
                      <CartesianGrid stroke="var(--border-1)" strokeDasharray="2 4" />
                      <XAxis dataKey="step" tick={{ fill: 'var(--text-3)', fontSize: 10 }} stroke="var(--border-2)" />
                      <YAxis tick={{ fill: 'var(--text-3)', fontSize: 10 }} stroke="var(--border-2)" domain={tightDomain} allowDataOverflow={false} />
                      <Tooltip content={({ active, payload, label }) => {
                        if (!active || !payload?.length) return null;
                        return (
                          <div style={{ background: 'var(--bg-2)', border: '1px solid var(--border-2)', padding: 10, borderRadius: 10, fontSize: 11 }}>
                            <div style={{ color: 'var(--text-1)', marginBottom: 4 }}>Step {label}</div>
                            {payload.filter(p => p.value != null && ['bear','avg','bull'].includes(p.dataKey)).map(p => (
                              <div key={p.dataKey} className="stat-num" style={{ color: p.color, display: 'flex', justifyContent: 'space-between', gap: 12 }}>
                                <span>{p.dataKey}</span>
                                <span>{fmt(p.value, 2)}</span>
                              </div>
                            ))}
                          </div>
                        );
                      }} />
                      <ReferenceLine y={100} stroke="var(--border-2)" strokeDasharray="3 3" />
                      <Line type="monotone" dataKey="bull" stroke="var(--accent-green)" strokeWidth={simBias === 'bull' ? 2.5 : 1.5} strokeDasharray={simBias === 'bull' ? '0' : '4 4'} dot={false} />
                      <Line type="monotone" dataKey="avg" stroke="var(--accent-purple)" strokeWidth={simBias === 'avg' ? 2.5 : 1.5} strokeDasharray={simBias === 'avg' ? '0' : '4 4'} dot={false} />
                      <Line type="monotone" dataKey="bear" stroke="var(--accent-red)" strokeWidth={simBias === 'bear' ? 2.5 : 1.5} strokeDasharray={simBias === 'bear' ? '0' : '4 4'} dot={false} />
                      <Line type="monotone" dataKey="marker" stroke="var(--accent-orange)" strokeWidth={0} dot={{ r: 6, fill: 'var(--accent-orange)', stroke: '#fff', strokeWidth: 2 }} />
                    </ComposedChart>
                  </ResponsiveContainer>

                  {/* Portfolio impact in sim */}
                  <div className="card-tight" style={{ padding: 12, marginTop: 12 }}>
                    <div style={{ fontSize: 11, color: 'var(--text-3)', marginBottom: 8 }}>Live Portfolio Impact</div>
                    <div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(4, 1fr)', gap: 10 }}>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Cost Basis</div>
                        <div className="stat-num" style={{ fontSize: 14, color: 'var(--text-1)', fontWeight: 600 }}>{usd(baseTotalValue)}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Current Value</div>
                        <div className="stat-num" style={{ fontSize: 14, color: 'var(--text-1)', fontWeight: 700 }}>{usd(currentTotalValueRaw)}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Unreal P/L</div>
                        <div className="stat-num" style={{ fontSize: 14, color: totalUnrealizedPnL >= 0 ? 'var(--accent-green)' : 'var(--accent-red)', fontWeight: 700 }}>
                          {totalUnrealizedPnL >= 0 ? '+' : '−'}${fmt(Math.abs(totalUnrealizedPnL), 2)}
                        </div>
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--text-3)' }}>P/L %</div>
                        <div className="stat-num" style={{ fontSize: 14, color: totalUnrealizedPnL >= 0 ? 'var(--accent-green)' : 'var(--accent-red)', fontWeight: 700 }}>
                          {signed(totalUnrealizedPnLPct, 2)}%
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
